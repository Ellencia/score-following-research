<h2 id="이-논문이-풀려는-문제는-무엇인가">이 논문이 풀려는 문제는 무엇인가</h2>
<p>연주회장에서 피아니스트가 쇼팽을 연주하고 있다고 상상해 보자. 옆에는 페이지를 넘겨주는 사람이 앉아 있다. 그 사람은 악보를 손에 들고 연주자의 호흡을 따라가다가, 적절한 순간에 다음 페이지로 넘긴다. 너무 빨리 넘겨도 안 되고 너무 늦어도 안 된다. 연주자가 갑자기 빨라지거나 느려져도 흐름을 놓치지 않아야 한다. 컴퓨터에게 바로 이 일을 시키는 분야가 "score following", 우리말로 풀면 "악보 따라가기" 또는 "음악 추적(music tracking)"이다.</p>
<p>조금 더 정확히 말하면, score following은 컴퓨터가 라이브로 들어오는 소리와 미리 가지고 있는 악보를 비교하면서, 매 순간 "지금 연주자는 악보의 어느 마디, 어느 음을 연주하고 있는가"를 실시간으로 알아내는 기술이다. 이것이 가능해지면 자동 페이지 넘김, 라이브 음악과 동기화된 영상·자막 표시, 컴퓨터가 사람과 함께 호흡을 맞춰 연주하는 자동 반주 같은 응용이 줄줄이 따라온다.</p>
<p>Andreas Arzt가 2016년 오스트리아 요하네스 케플러 대학교(JKU)에 제출한 이 박사학위논문은, 이 분야의 한 알고리즘을 새로 발명한 글이라기보다는 **"여러 모듈을 한 데 묶어서 실제 공연장에서도 살아남는 시스템을 만들어 낸 종합 연구"**에 가깝다. 단일 곡을 따라가는 추적기를 출발점으로 삼되, 거기에 템포 변화 보정기, 특징량 안정화기, 실제 연주를 참조로 쓰는 모듈, 대형 악보 데이터베이스 검색기, 그리고 여러 가설을 동시에 굴리는 다중 에이전트 추적기까지 차곡차곡 쌓아 올렸다. 그 결과물은 2016년 암스테르담 콘세르트헤바우(Concertgebouw)에서 슈트라우스의 <em>알프스 교향곡</em> 실황 공연을 따라가며 관객에게 악보, 영상, 해설 자막을 동기화해 보여주는 시연으로 이어졌다.</p>
<h2 id="한-줄-비유로-본-이-논문의-핵심">한 줄 비유로 본 이 논문의 핵심</h2>
<p>이 논문은 한 사람의 페이지 넘김 도우미를 만드는 책이라기보다, **"가장 노련한 페이지 넘김 도우미, 템포 직관을 가진 부지휘자, 모든 악보를 외우고 있는 사서, 그리고 여러 가능성을 동시에 머릿속에서 굴리는 토론자를 한 팀으로 묶는 매뉴얼"**에 가깝다. 어느 한 명이 실수해도 나머지가 받쳐주도록 설계된 팀이다.</p>
<h2 id="핵심-아이디어를-한-그림으로">핵심 아이디어를 한 그림으로</h2>
<pre class="mermaid"><code>flowchart LR
    A[라이브 오디오] --&gt; B[특징 추출]
    B --&gt; C[On-line DTW]
    C --&gt; D[Backward path 기반 템포 추정]
    D --&gt; E[Tempo model 보정]
    E --&gt; F[현재 score 위치]
    A --&gt; G[노트 전사]
    G --&gt; H[Tempo-invariant fingerprint]
    H --&gt; I[대규모 score DB 검색]
    I --&gt; J[Multi-agent 가설 추적]
    J --&gt; K[작품 ID + 위치]
</code></pre>
<p>위 그림은 이 시스템이 두 개의 평행한 길로 일하고 있다는 것을 보여 준다. 위쪽 길은 "어떤 곡인지 이미 안다"는 가정 아래 그 곡 안에서 위치를 정밀하게 따라가는 길이고, 아래쪽 길은 "지금 들리는 게 도대체 무슨 곡인지"부터 알아내는 길이다. 위쪽 길에서는 들어오는 소리에서 음높이와 음의 시작점에 관한 특징을 뽑은 뒤, 시간 축이 늘어나거나 줄어들어도 두 시계열을 잘 맞추는 알고리즘인 on-line DTW가 위치를 추정한다. 거기에 "지금 연주가 어느 정도 빠른가"를 가늠하는 템포 모델이 보정을 더한다. 아래쪽 길에서는 들어오는 소리를 음표 목록으로 옮긴 뒤, 그 음표 패턴을 지문(fingerprint)처럼 만들어 거대한 악보 도서관에서 검색한다. 검색 결과는 한 가지로 단정 짓지 않고 여러 가능성을 동시에 추적하다가, 시간이 지나면서 가장 잘 맞는 가설로 수렴한다.</p>

<h2 id="이-논문의-새로운-점">이 논문의 새로운 점</h2>
<p>기존의 score following 연구는 종종 한 가지 기둥을 더 정교하게 깎는 데 집중했다. 더 좋은 정렬 알고리즘, 더 정밀한 확률 모델, 이런 식이다. 이 논문의 사고방식은 다르다. **"하나의 알고리즘이 모든 어려움을 다 막아 낼 수는 없다. 그러므로 서로 다른 약점을 가진 모듈을 조합해 약점이 겹치지 않게 하자"**는 시스템 공학적 관점이 전면에 깔려 있다.</p>
<p>그 관점이 구체적으로 다섯 가지 보강으로 나타난다. 첫째는 <strong>템포 모델</strong>이다. 단순히 "지금 어디?"만 묻는 게 아니라 "지금 얼마나 빠르게 흘러가고 있나?"를 함께 추정해서 다음 위치 예측을 매끈하게 만든다. 같은 쇼팽 전주곡이라도 연주자마다 130번째 박 부근에서 갑자기 늦추거나 190번째 박에서 살짝 휘몰아치는 식의 차이가 큰데, 이런 변화를 따라잡으려면 템포가 일종의 제어 신호 역할을 해야 한다. 둘째는 <strong>특징량 정규화</strong>다. 음의 시작점을 강조하는 특징은 정밀하지만 에너지가 출렁이면 거리 계산이 왜곡되기 쉽다. 이걸 정규화하고 다른 화성 특징과 결합해 사용하면 더 안정적이다. 셋째는 <strong>실연주 참조</strong>다. 피아노는 컴퓨터가 MIDI로 합성해도 그럴듯하지만, 오케스트라는 합성이 영 어색해서 라이브 사운드와 잘 맞지 않는다. 그래서 차라리 실제 연주 녹음 자체를 참조 트랙으로 쓰면, 라이브 입력과 같은 결의 소리끼리 비교하는 셈이 되어 정확도가 올라간다. 넷째는 <strong>지문 검색</strong>이다. 곡이 무엇인지 사전에 모르는 상황에서도, 짧은 음표 패턴 몇 개로 수백 곡 규모의 도서관에서 후보를 빠르게 추려 낸다. 다섯째는 <strong>다중 에이전트 추적</strong>이다. 검색이 내놓은 여러 후보 위치를 한 번에 하나만 골라 단정하지 않고, 여러 가설을 동시에 굴리며 시간이 흐를수록 점수가 높은 가설만 남도록 만든다.</p>
<p>이 다섯 보강이 톱니바퀴처럼 맞물려 있어, 한 모듈이 어려운 구간에서 흔들려도 다른 모듈이 그 자리를 메운다. **"하나의 천재"가 아니라 "약점이 다른 다섯 명의 팀"**이 핵심 비유다.</p>
<h2 id="한계와-의의">한계와 의의</h2>
<p>이 시스템이 모든 음악에 다 통하는 만능은 아니다. 본문 자체가 인정하듯 피아노 작품에서는 매우 잘 동작하지만, 두 편의 교향곡에서는 어려운 구간이 보인다. 또한 데이터베이스에 들어가는 악보-오디오 연결 정보를 만들기 위해 미리 오프라인 정렬 작업을 거쳐야 한다. 이는 시스템을 새로운 곡에 적용하려 할 때마다 사람이 어느 정도 사전 작업을 해야 한다는 뜻이다. 한국 전통음악, 재즈, 자유 템포가 큰 즉흥 연주 같은 영역에는 그대로 옮겨 쓰기 어렵다. 그리고 곡 중간에 반복이 갑자기 들어오거나 통째로 건너뛰는 식의 <strong>구조 변형</strong>에는 여전히 약하다.</p>
<p>그럼에도 불구하고 이 논문이 가지는 의의는 분명하다. 콘세르트헤바우에서 한 시연이 보여준 바와 같이, 실험실 벤치마크가 아닌 진짜 청중 앞에서 작동하는 시스템을 세웠다는 사실이 중요하다. 비유하자면 **"실험실에서만 잘 달리던 자율주행차를, 실제 도심 교통 한복판으로 끌고 나와 한 시간을 무사고로 운행한 사건"**에 가깝다. 그 결과 이후 연구자들은 이 논문을 단순한 한 편의 알고리즘이 아니라 <strong>DTW 계열 score following이 도달한 성숙한 표준점</strong>으로 인용하게 되었다.</p>
<h2 id="더-알고-싶다면--핵심-후속-연구-미리보기">더 알고 싶다면 — 핵심 후속 연구 미리보기</h2>
<p>이 논문이 닦아 놓은 길은 그 이후 여러 갈래로 갈라진다. 한 갈래는 <strong>악보 이미지 자체를 직접 보고 따라가는 신경망 연구</strong>다. MIDI나 미리 정렬된 데이터 대신, 스캔된 악보 이미지에서 위치를 시각적으로 짚는 식이다. 또 다른 갈래는 <strong>강화학습으로 악보를 따라가는 에이전트</strong>를 만드는 연구다. 페이지를 넘기는 행위 자체를 보상이 있는 의사결정 문제로 다루는 셈이다. 세 번째 갈래는 <strong>딥러닝 기반 노트 전사와 학습된 임베딩</strong>을 결합해 알고리즘을 단계별 모듈에서 끝-끝(end-to-end) 학습으로 묶어 내려는 흐름이다. 이 모든 흐름이 결국 다시 묻는 질문은 이 박사학위논문이 처음 정리해 놓은 그 질문, 곧 **"실연주의 빠르기 변화, 실수, 그리고 구조 변형 앞에서 어떻게 강건하면서도 유연한 음악 추적이 가능한가"**라는 질문이다. 그 점에서 이 논문은 시간이 지나도 출발점으로 자주 돌아오게 되는 좌표 같은 글이다.</p>
