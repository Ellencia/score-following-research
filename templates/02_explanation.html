<h2 id="이-논문이-풀려는-문제는-무엇인가">이 논문이 풀려는 문제는 무엇인가</h2>
<p>오케스트라 연주회에 가본 적이 있다면, 지휘자 옆에서 악보를 넘겨 주는 사람을 본 적이 있을 것이다. 연주자가 한 손을 떼지 않고도 다음 페이지로 넘어갈 수 있도록 누군가가 음악의 흐름을 따라가며 정확히 그 순간에 페이지를 넘겨 준다. 컴퓨터에게도 같은 능력을 가르치는 것이 바로 "score following"이다. 마이크로 들어오는 소리를 들으며, 연주자가 지금 악보의 어느 부분을 연주하고 있는지를 실시간으로 짚어 내는 일이다. 이렇게 위치를 알고 있으면 자동으로 페이지가 넘어가게 만들 수도 있고, 연주에 맞춰 가사를 띄워 주거나 컴퓨터가 반주를 함께 칠 수도 있다.</p>
<p>이 논문이 특별한 까닭은, 컴퓨터에게 "악보를 그림으로 그대로 보여 주고" 음악을 들려준다는 점에 있다. 지금까지 score following을 시도한 거의 모든 연구는 악보를 사람이 다시 입력하거나 OMR(악보를 사진에서 음표 데이터로 바꿔 주는 광학 인식) 같은 도구를 거쳐 컴퓨터가 다루기 쉬운 디지털 형식(MusicXML이나 MIDI)으로 변환한 뒤에 그것을 음악과 맞추었다. 그런데 이 변환 단계는 손이 많이 가고, 자동 변환은 복잡한 악보에서 자주 틀린다. Dorfer, Arzt, Widmer는 이 중간 단계를 통째로 건너뛴다. 사진처럼 보이는 악보 이미지와 마이크로 들어온 소리(스펙트로그램)를 두 갈래의 신경망에 동시에 넣어 주고, "이 짧은 소리 조각이 악보 이미지 위 어느 가로 위치에 해당하는지" 점 하나로 답하게 하는 것이다(PDF p.1).</p>
<h2 id="핵심-아이디어를-한-그림으로">핵심 아이디어를 한 그림으로</h2>
<pre class="mermaid"><code>flowchart LR
  A[악보 이미지 한 줄 40x390 픽셀] --&gt; B[Sheet CNN 악보 읽기]
  S[스펙트로그램 1.2초 40프레임] --&gt; C[Audio CNN 음악 듣기]
  B --&gt; D[두 표현을 합치는 Concat 층]
  C --&gt; D
  D --&gt; E[밀집 신경망 두 층]
  E --&gt; F[악보를 40개 칸으로 자른 뒤 어느 칸인지 분류]
  F --&gt; G[픽셀 위치 x_hat 예측]
</code></pre>
<p>비유하자면 두 명이 한 팀이 되어 일하는 것과 비슷하다. 한 사람은 악보 그림만 본다. 그는 악보 한 줄을 길쭉한 사진 한 장으로 받아 음표들이 어디에 어떤 모양으로 놓여 있는지 살핀다. 다른 한 사람은 음악만 듣는다. 그는 1.2초 분량의 소리 조각을 듣고 어떤 음들이 어떤 리듬으로 흘렀는지를 머릿속으로 정리한다. 그런 뒤 두 사람이 머릿속 메모를 합쳐 "이 소리는 저 그림의 이쯤이야"라고 같이 손가락질을 한다. 신경망은 사진 보는 사람과 소리 듣는 사람을 각자 별도의 컨볼루션 신경망(CNN) 두 갈래로 만들고, 그 끝에서 둘의 메모를 이어 붙인 뒤, 마지막에는 악보를 가로 방향으로 40개의 작은 칸(버킷)으로 잘라 두고 "어느 칸인가"를 고르게 한다. 칸 번호를 고르고 나면 그 칸의 가운데 좌표를 답으로 내놓는다(PDF p.2-3).</p>

<h2 id="이-논문의-새로운-점">이 논문의 새로운 점</h2>
<p>이전의 대표적 score following은 두 단계로 일했다. 먼저 악보를 MusicXML이나 MIDI 같은 컴퓨터가 이해할 수 있는 기호 형태로 바꾼다. 그런 다음 들어오는 소리를 그 기호와 한 음 한 음 맞춰 본다. 맞추는 알고리즘으로는 시간 축을 늘리거나 줄여 가며 두 시퀀스의 거리를 잰다는 동적 시간 정합(DTW) 같은 기법, 또는 음표 진행을 확률적인 상태 전이로 모형화한 HMM 같은 기법이 자주 쓰였다. 이 방식은 잘 변환된 기호 악보가 있을 때는 매우 정확하지만, 출발점인 기호 악보 자체가 깨끗하지 않으면 모든 단계가 흔들린다. 본 논문은 다음 세 단계로 사고를 뒤집었다(PDF p.1-3).</p>
<p>첫째, 악보를 종이 그대로의 그림으로 받아들인다. 즉 사람이 악보를 보고 음악을 따라가듯, 컴퓨터에게도 사진을 직접 보여 준다. 둘째, 두 종류의 입력—악보 그림과 소리 스펙트로그램—을 각자의 CNN으로 처리한 뒤 한 자리에서 합쳐 본다. 이렇게 하면 "특정한 음표 그림"과 "그것이 났을 때의 소리 패턴"이 자연스럽게 짝지어지도록 신경망이 스스로 배운다. 셋째, "이 소리는 그림의 어느 픽셀이냐"라는 질문을 회귀(숫자 자체를 맞추는) 대신, 가로 방향으로 잘라 둔 작은 칸 중에서 고르는 분류 문제로 바꾼다. 이 분류 출력은 자연스럽게 "여러 후보에 동시에 확률을 줄 수 있는" 형태가 되어, 음악에서 흔한 반복 구조 같은 모호한 상황도 표현할 수 있다(PDF p.4).</p>
<p>이 세 가지 변화 덕분에 OMR 같은 변환 단계를 거치지 않고도 raw 데이터만으로 동작하는 정렬기를 얻을 수 있었다. 제한적인 조건(피아노, 단성, 한 줄)에서 학습된 모델은 한 번도 본 적 없는 테스트곡에서도 84% 이상의 노트를 한 칸 오차 안에 짚어 낸다. 더 나아가, saliency map을 보면 모델이 음표의 머리(공처럼 생긴 부분)에 시선을 두고 있고, 4분음표와 8분음표를 구분하기 위해 음표 기둥(stem)까지 확인한다는 사실이 드러나, "사람이 가르쳐 주지 않았는데도 음악적으로 의미 있는 부분을 보고 있다"는 점을 시각적으로 확인할 수 있다(PDF p.5).</p>
<h2 id="한계와-의의">한계와 의의</h2>
<p>논문의 마지막에서 저자들은 "이건 가능성을 보여 주는 첫걸음"이라는 점을 분명히 밝힌다. 모델은 한 번에 한 음만 울리는 음악, 그것도 악보 한 줄, 피아노 한 가지, 학습할 때 정한 속도와 비슷한 연주에서만 잘 작동한다. 화음이 많이 나오는 음악(다성), 한 페이지 전체나 여러 줄을 동시에 다뤄야 하는 상황, 오케스트라처럼 여러 악기가 섞인 녹음, 사람마다 크게 다른 템포 변화는 아직 다루지 못한다. 또한 학습용 데이터에서는 정확도가 79%인데 처음 보는 곡에서는 55%로 떨어지는 격차가 있어, 모델이 학습 데이터를 더 잘 외운 측면이 있음을 짐작하게 한다(PDF p.5). 평가 또한 노트가 새로 시작되는 순간에 한정되어 있어, 음이 길게 끌리는 동안의 위치 추적이 얼마나 안정적인지에 대한 정량 평가는 적다.</p>
<p>그럼에도 의의는 크다. 이 논문은 score following이 더 이상 깨끗한 기호 악보를 전제로 하지 않아도 된다는 가능성을 처음으로 실증해 보였다. 종이 악보, 스캔된 도서관 자료, 손으로 베껴 쓴 메모처럼 변환이 어려운 자료까지도 잠재적으로 컴퓨터가 따라갈 수 있는 길을 열었다. 저자들은 결론에서 이 모델의 확률 출력을 기존의 score following 알고리즘과 결합하고, 한 줄 → 한 페이지 → 여러 페이지로 점차 키워 나가, 끝내는 "데이터 준비 없이 어떤 클래식 악보든 곧장 따라갈 수 있는" 시스템을 만들겠다는 비전을 제시한다(PDF p.5). 4.2절에서 직접 사람이 친 바흐 미뉴엣을 따라가는 데모는 그 비전이 단지 이론이 아님을 짧게 보여 주며, 71.72%의 노트를 한 칸 오차 안에 맞춘 결과는 후속 연구가 출발할 수 있는 든든한 기준선이 된다(PDF p.5).</p>
