<h2 id="핵심-요약">핵심 요약</h2>
<p>이 논문은 음악 정보 검색(MIR) 분야에서 오디오–오디오 및 오디오–악보 동기화의 정확도와 강건성을 동시에 끌어올리는 새로운 파이프라인을 제안한다. 기존의 동기화 시스템이 chroma 또는 onset feature를 사용하거나, AMT(Automatic Music Transcription) 모델의 최종 심볼릭(이산화) 출력에 의존했던 것과 달리, 저자들은 transcription 신경망의 중간 산출물인 raw onset/frame 확률(연속값 [0,1])을 그대로 DTW에 입력으로 사용한다. ASAP과 BPSD(Beethoven Piano Sonata Dataset) 두 데이터셋에서 RAW 특성이 SYM(이산화) 특성 대비 outlier를 크게 줄이고 95% 신뢰구간을 좁힌다는 점을 실험적으로 보인다. 또한 도메인 시프트가 큰 역사적 녹음(예: Gulda 1958, Bilson 1997 fortepiano)에 대해서는 transcription 모델을 target 데이터로 fine-tuning(T3)하면 정렬 강건성이 극적으로 향상되어 beat-tracking 수준의 정밀도(95% conf. interval 약 62 ms)에 도달함을 보여준다.</p>

<h2 id="상세-요약">상세 요약</h2>
<p><strong>문제 설정.</strong> 동기화(synchronization)는 같은 곡의 서로 다른 버전(다른 연주자, 다른 녹음, 또는 악보와 오디오)을 동일한 시간축에 정렬하는 작업이다. 전통적으로 DTW 기반 파이프라인은 chroma 혹은 onset feature를 사용한다. chroma는 multirate filterbank나 constant-Q transform 같은 신호처리 기법으로 추출되며, onset은 별도 추정기로 얻는다. 그러나 hand-crafted feature는 다양한 음향 조건(저품질 역사적 녹음, fortepiano, 튜닝 편차 등)에서 false positive가 많거나 onset을 놓치는 등 구조적 한계가 있다. 한편 최근의 AMT 모델(Onsets and Frames 류)은 음표 onset/frame을 정확히 추정할 수 있게 되었지만, 동기화 파이프라인에 결합할 때 보통 후처리를 거친 이산 SYM 출력만을 활용해 왔다.</p>
<p><strong>핵심 아이디어.</strong> 저자들은 transcription 모델의 중간 출력—frame 활성 확률 P_raw^frame과 onset 확률 P_raw^onset (각각 [0,1] 사이의 연속값, 88 pitch × N frame)—을 그대로 raw feature로 사용한다. 이 raw 표현은 임계값을 적용한 SYM과 달리 음표 경계 근처의 모호성을 부드럽게 보존한다. 본문 Figure 2 분석에서, T1_RAW는 DK(Disklavier 참조) 대비 매우 안정적이며 onset이 정확히 일치하지만, T1_SYM은 thresholding 때문에 음표 길이가 들쭉날쭉해 정렬 불안정을 유발한다는 점이 시각적으로 드러난다.</p>
<p><strong>파이프라인.</strong> 두 가지 DTW 변형이 비교된다. (1) O: onset feature만 12차원 pitch class로 변환하고 표준 DTW(스텝 가중치 1.5, 1.5, 2)를 사용. (2) OF: frame과 onset을 결합한 high-resolution 접근으로, frame은 cosine 거리, onset은 Euclidean 거리로 비용 행렬을 만든 뒤 합산하여 multi-resolution multi-scale DTW(MrMsDTW, [14])로 풀이한다. Onset에는 DLNCO(Decaying Locally Normalized Chroma Onset) 가공이 적용된다. 평가를 위해 두 가지 무지도(annotation-free) 휴리스틱이 사용된다: BPSD에서는 measure transfer(Wilhelm Kempff 1964 수동 주석을 다른 버전으로 전이), ASAP에서는 note onset transfer(score→A1, A1→A2 두 경로의 시간 차이).</p>
<p><strong>주요 결과.</strong> ASAP에서는 RAW_OF가 SYM 대비 mean 및 95% confidence interval을 모두 줄였고, T2_RAW_OF는 DK_SYM_OF조차 능가하는 mean 21 ms / 95% 99 ms를 기록했다. BPSD에서는 RAW_OF가 SYM_O 대비 outlier를 크게 줄였으며(T1: 234 → 121 ms, T2: 466 → 207 ms), T1이 음향적으로 다양한 MusicNet으로 학습되어 MAESTRO만 학습한 T2보다 BPSD에서 강건했다. Gulda 1958(FG58, 95% conf. 788 ms), Bilson 1997(MB97, fortepiano)이 문제 버전으로 식별되었고, T1을 BPSD로 fine-tuning한 T3가 FG58을 80 ms, MB97을 103 ms로 끌어내려 평균 95% conf. 62 ms를 달성했다.</p>

<p><strong>결론.</strong> raw feature는 transcription을 수행할 때 어차피 계산되는 부산물이므로 추가 비용이 없다는 점에서, 저자들은 동기화 파이프라인에서 raw feature를 기본 옵션으로 채택할 것을 제안한다. 동시에 도메인 시프트가 큰 데이터셋에서는 unaligned audio–score 페어로 transcription 모델을 fine-tune하는 것이 강건성을 크게 개선한다는 실용적 권고를 제시한다.</p>
<h2 id="방법론과-데이터">방법론과 데이터</h2>
<p><strong>Transcription 모델 후보.</strong></p>
<ul>
<li><strong>FB (Filterbank)</strong>: Sync Toolbox [14]의 multirate filterbank 기반 베이스라인.</li>
<li><strong>T1</strong>: Maman &amp; Bermano [4]의 Onsets and Frames 변형, MusicNet [16]에 재정렬된 라벨로 학습. 음향적으로 다양한 데이터에 강함.</li>
<li><strong>T2</strong>: Kong et al. [27]의 high-resolution piano transcription with pedals, MAESTRO [25]로 학습.</li>
<li><strong>DK (Disklavier)</strong>: Disklavier 심볼릭 트랙으로부터 직접 추출된 feature, MPE 추출기의 상한선(upper bound) 역할.</li>
<li><strong>T3</strong>: T1을 BPSD target audio에 fine-tune한 모델.</li>
</ul>
<p><strong>Feature 추출 위치.</strong> transcription 네트워크의 onset/frame prediction head 직전(또는 직후) sigmoid 출력—즉 후처리 전 연속 확률값을 그대로 추출. 88 pitch × N frame 형태의 pianoroll-like 표현으로 저장. T2는 추가로 velocity와 offset 확률을 예측하지만 본 동기화 실험에서는 frame과 onset만 사용.</p>
<p><strong>동기화 알고리즘.</strong></p>
<ul>
<li><strong>O</strong>: onset 확률을 12-d pitch class로 압축 → Euclidean cost → standard DTW (1.5, 1.5, 2 step weights).</li>
<li><strong>OF</strong>: frame은 cosine, onset은 DLNCO 적용 후 Euclidean. 두 cost matrix를 합산해 MrMsDTW [14, 33]로 multi-resolution 정렬. Chroma만 단독 사용은 onset이 명확한 피아노에 대해 [11]에서 alignment error 100% 증가가 보고되어 제외.</li>
</ul>

<p><strong>평가 지표.</strong> Ground-truth 정렬이 없는 실세계 데이터를 다루기 때문에 두 가지 transitive consistency 휴리스틱을 사용:</p>
<ul>
<li>BPSD measure transfer: ε = |M_S→A1(t_S) − M_A2→A1(t_A2)|</li>
<li>ASAP note onset transfer: ε = |M_S→A2(t_S) − M_A1→A2(M_S→A1(t_S))|</li>
</ul>
<p>각 페어에 대해 절대 오차의 mean, median, 90·95 percentile을 계산해 ms 단위로 보고. [37]의 triple-based analysis 관점.</p>
<p><strong>재현성.</strong> 본문에 코드 공개 명시는 없으나, 사용 모델([4], [27]), 데이터셋(ASAP, BPSD), 알고리즘(Sync Toolbox [14])이 모두 외부에서 이용 가능하므로 파이프라인 재구성은 가능. T3 fine-tuning은 [4]의 unaligned audio–score 학습 절차를 따른다고 명시.</p>
<h2 id="비판적-평가">비판적 평가</h2>
<p><strong>강점.</strong></p>
<ul>
<li>현대 DL 기반 transcription과 고전 DTW를 자연스럽게 결합한 실용적 설계. 추가 학습 없이 기존 transcription 모델의 부산물(raw 확률)을 재활용하므로 계산 오버헤드가 사실상 0.</li>
<li>정확도(median)뿐 아니라 강건성(95% confidence interval)을 핵심 지표로 강조하여, 실무에서 정말 중요한 outlier 거동을 정량화.</li>
<li>음향적으로 매우 도전적인 BPSD(역사적 녹음, fortepiano)에서의 평가는 학계 벤치마크의 sterile한 한계를 보완.</li>
<li>Fine-tuning을 unaligned 페어로 수행해 reference 정렬에 overfit하지 않는 점이 학술적으로 깔끔.</li>
</ul>
<p><strong>약점 및 한계.</strong></p>
<ul>
<li>Transcription 모델 의존성: pitched onset이 명확한 피아노 음악에 한정된 평가. 보컬, 관현악, 타악 위주 음악에서의 일반화는 미검증(저자도 future work로 명시).</li>
<li>DK reference도 perfect ground truth가 아닌 점, 그리고 evaluation이 transitive consistency에만 의존하는 점은 필요조건이지 충분조건이 아님(저자도 [37]을 인용하며 인정).</li>
<li>T2가 ASAP에서 좋은 성적을 낸 이유 중에는 ASAP이 MAESTRO 기반이라 train/test 분리 보장이 어렵다는 caveat가 본문에 명시되어 있어, T2 결과 일부는 낙관적일 수 있음.</li>
<li>Fine-tuning(T3) 결과는 단일 데이터셋(BPSD)에 한정. 다른 도메인 시프트(예: 비-피아노)에 대한 일반 절차로 확장 가능한지는 입증되지 않음.</li>
<li>raw feature가 SYM 대비 항상 우월한 것은 아니며(BPSD에서 FB_RAW_OF가 T2보다 강건한 사례 존재), 모델 선택과 학습 데이터 다양성이 결과를 좌우.</li>
</ul>

<h2 id="실무적-함의와-응용">실무적 함의와 응용</h2>
<ul>
<li><strong>악보 추종(score following)·자동 페이지 넘김</strong>: 96% 신뢰구간 60~120 ms 수준의 정렬 정밀도는 실시간 추종의 부트스트랩 또는 오프라인 backbone에 충분.</li>
<li><strong>Score-informed source separation</strong>: [3]과 같은 음원 분리에서 timing-critical한 score-audio 정렬을 raw feature로 즉시 강화 가능.</li>
<li><strong>데이터셋 자동 라벨링</strong>: AMT 학습 데이터를 만들 때 reference alignment를 RAW_OF로 부트스트랩 → fine-tune 사이클 가능. 본문에서 "beat-tracking tolerance(70 ms) 수준"이라 명시한 정밀도가 이를 뒷받침.</li>
<li><strong>역사적/저품질 녹음 디지털화</strong>: 음악학자들이 다루는 vinyl, fortepiano 등 도메인 시프트 큰 자료에 fine-tuning 절차를 그대로 적용 가능.</li>
<li><strong>Cross-version 분석·콘서트 트랙 스위칭</strong>: [5, 6]과 같이 같은 곡의 다른 버전 간 알람·전환 UI에서 outlier 감소가 사용자 경험에 직접 기여.</li>
<li><strong>자동 반주(automatic accompaniment)</strong>: 라이브 입력에 대한 사전 정렬 정확도 향상으로 [7, 8] 같은 시스템의 견고성에 기여.</li>
</ul>
