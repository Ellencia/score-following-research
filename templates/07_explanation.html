<h2 id="이-논문이-풀려는-문제는-무엇인가">이 논문이 풀려는 문제는 무엇인가</h2>
<p>같은 곡을 여러 사람이 연주한 녹음이 있다고 해보자. 호로비츠가 1980년에 친 베토벤 소나타와, 케이프(Kempff)가 1964년에 친 같은 곡의 녹음, 그리고 악보 PDF. 셋은 모두 "같은 음악"이지만 서로 길이도 다르고, 박자도 달리 살리고, 어떤 마디는 천천히 또 어떤 마디는 빠르게 친다. 이 셋을 같은 시간 자(尺) 위에 올려놓는 일이 바로 **음악 동기화(audio synchronization)**다. 동기화가 잘 되면 "악보의 23마디 두 번째 박자에서 호로비츠는 12.4초, 케이프는 14.1초에 그 음을 친다"라고 말할 수 있다.</p>
<p>이 작업이 왜 중요할까? 자동 페이지 넘김(연주자가 치는 동안 태블릿이 알아서 악보를 넘겨주는 기능), 같은 곡의 여러 연주를 비교 분석하는 음악학 연구, 한 녹음에 단 주석을 다른 녹음으로 자동 옮기기, 음원 분리(어느 시점에 어떤 음이 울리는지 알면 분리 정확도가 올라간다)—이 모든 응용이 정확한 동기화 위에 서 있다.</p>
<p>전통적인 동기화 시스템은 두 단계로 작동한다. 먼저 오디오에서 "이 시점에 어떤 음높이가 울리는가"를 나타내는 **특징(feature)**을 뽑고, 그 특징의 시간 진행을 비교해서 두 녹음의 시간축을 맞추는 알고리즘(보통 DTW)을 돌린다. 문제는 이 "특징 뽑기" 단계가 까다롭다는 것이다. 특히 음질이 나쁜 옛날 LP 녹음, 현대 피아노가 아니라 옛날 악기(포르테피아노)로 친 녹음, 표준 음높이(A=440 Hz)에서 벗어난 튜닝—이런 까다로운 데이터에서는 기존 특징이 자주 헛발질을 한다.</p>
<p>이 논문이 던지는 질문은 단순하다. <strong>"요즘 똑똑해진 자동 채보(transcription) 신경망이 이미 음표를 잘 알아듣고 있는데, 왜 그 신경망의 최종 결과(이 음이 울렸다/안 울렸다라는 0/1 판단)만 쓰고, 신경망 안에서 흐르는 더 풍부한 신호는 버리고 있는가?"</strong> 그리고 그 안쪽 신호—저자들이 raw feature라 부르는 것—를 직접 동기화에 쓰면 더 강건한 정렬이 가능함을 보인다.</p>
<h2 id="핵심-아이디어를-한-그림으로">핵심 아이디어를 한 그림으로</h2>
<pre class="mermaid"><code>flowchart LR

<p>비유하자면 이렇다. 어떤 사람에게 음악을 들려주고 "지금 어떤 건반이 눌렸어?"라고 묻는다고 하자. 답하는 방법이 두 가지 있다.</p>
<p><strong>방법 1 (SYM, 기존 방식).</strong> "도가 눌렸어요. 미가 눌렸어요. 솔이 눌렸어요." 이렇게 또렷한 결정만 내려서 알려준다. 깔끔하지만, 만약 그 사람이 잠깐 헷갈렸거나 음이 너무 빨리 지나가서 살짝만 들렸다면, 결정 단계에서 그 정보가 사라진다.</p>
<p><strong>방법 2 (RAW, 이 논문 방식).</strong> "도일 가능성 92%, 도샵 8%, 미일 가능성 80%, 미플랫 15%..." 이렇게 확신의 정도까지 다 알려준다. 모호한 순간—예를 들어 화음을 살짝 빨리 굴려 친 순간—에도 그 모호함이 정렬 알고리즘에까지 전달된다. DTW는 이 부드러운 정보를 활용해 더 안정적인 정렬을 찾는다.</p>
<p>저자들은 또 한 가지 트릭을 더 쓴다. 채보 신경망이 베토벤 소나타의 옛날 LP 녹음을 잘 못 알아듣는다면(이런 녹음은 모델 학습 때 보지 못한 도메인이니까), 그 데이터로 신경망을 한 번 더 살짝 훈련(fine-tuning)시켜 적응시킨다. 이때도 정답 정렬은 필요 없고, "이 오디오에 이 악보가 대응한다"는 페어 정보만 있으면 된다. 적응된 신경망(T3)이 만들어내는 raw feature는 까다로운 녹음에서도 안정적인 정렬을 만들어낸다.</p>

<h2 id="이-논문의-새로운-점">이 논문의 새로운 점</h2>
<p><strong>핵심 전환은 한 줄로 요약된다: "사람이 손으로 설계한 특징"에서 "신경망이 학습한 raw 특징"으로</strong>, 그것도 신경망의 최종 결정이 아닌 <strong>결정 직전의 확률 분포</strong>를 그대로 가져다 쓰는 것이다.</p>
<p>기존 흐름은 대략 두 갈래였다. 한쪽은 신호처리 기반 chroma·onset(예: Müller et al.의 Sync Toolbox에 들어 있는 multirate filterbank)을 DTW에 먹였다. 다른 한쪽은 채보 모델(Onsets and Frames, Kong et al. 등)을 돌려 이산 음표 결과를 얻은 뒤, 그 음표 정보를 다시 DTW용 특징으로 환산했다. 첫 번째는 학습된 정보를 못 쓰고, 두 번째는 학습된 정보의 가장 부드러운 부분을 임계값으로 잘라버린다.</p>
<p>이 논문은 그 사이에 새 길을 낸다. 신경망의 raw 출력—frame과 onset의 확률 행렬—을 그대로 12음 pitch class로 압축한 뒤 DTW의 비용 행렬에 넣는다. 이렇게 하면 정확한 채보가 어려운 모호한 순간(같이 친 듯 안 친 듯한 화음, 노이즈로 묻힌 음 등)에서도 부드러운 단서가 정렬에 기여한다. 결과적으로 평균 정렬 오차의 중간값(median)은 비슷하더라도, <strong>outlier(큰 오차)가 크게 줄어든다</strong>. 정렬이 어쩌다 한 번 크게 틀어지는 일이 줄어든다는 뜻인데, 실무에서는 이게 가장 중요하다. 또한 ASAP에서는 raw 특징 기반 정렬이 Disklavier 정답 음표 기반 정렬보다 오히려 더 강건한 결과를 내기도 했는데, 이는 raw의 부드러움이 화음 굴림 같은 미세한 연주 표정을 더 자연스럽게 다루기 때문이라고 저자들은 설명한다.</p>
<p>두 번째 새로움은 <strong>fine-tuning을 동기화 강건성 도구로 명시화</strong>했다는 점이다. 베토벤 데이터셋에서 가장 까다로웠던 두 녹음—굴다 1958년과 빌슨 1997년 포르테피아노—이 일반 모델로는 95% 신뢰구간이 각각 788 ms, 146 ms로 처참했다. 그런데 BPSD 자체로 모델을 살짝 재훈련하니 80 ms, 103 ms로 떨어졌다. 평균을 내면 평균 95% 신뢰구간이 62 ms로, 이는 박자 추적(beat tracking) 분야의 표준 허용오차(70 ms) 이내다. 즉 이 정렬을 다시 박자 추적 데이터셋의 정답으로 쓸 수 있을 만큼 정밀해진 것이다. <strong>데이터셋 → 모델 → 정렬 → 새 데이터셋</strong>의 선순환을 한 바퀴 돌릴 수 있는 정밀도다.</p>
<h2 id="한계와-의의">한계와 의의</h2>
<p>이 연구의 솔직한 한계 먼저. 첫째, 평가는 <strong>피아노 음악</strong>에 한정된다. 피아노는 음표 시작이 또렷하고("타!" 하고 망치가 현을 치는 그 순간), 채보 모델이 가장 잘 발달한 악기다. 보컬, 오케스트라, 일렉트릭 기타처럼 음표 경계가 흐릿한 음악에서 raw feature가 같은 효과를 낼지는 미지수다. 저자들도 결론에서 future work로 명시하고 있다.</p>
<p>둘째, 평가가 <strong>무지도 휴리스틱</strong>에 의존한다. 실세계 녹음에는 정답 정렬이 없으니, "score→A1과 score→A2를 거쳐 같은 시점으로 가면 A1→A2와 일치해야 한다"는 일관성을 검사하는 식이다. 일관성은 정확성의 필요조건이지 충분조건은 아니다. 다만 ASAP에서 Disklavier 정답이 있는 케이스도 함께 평가해 신빙성을 보강했다.</p>
<p>셋째, <strong>채보 모델 의존성</strong>. raw feature를 쓴다는 건 채보 모델이 잘 만들어져 있어야 한다는 전제를 깔고 있다. 새 장르나 새 악기에 진입할 때마다 채보 모델부터 키워야 하는 진입 장벽이 생긴다. 이는 fine-tuning으로 어느 정도 완화되지만, 완전히 사라지지는 않는다.</p>
<p>그럼에도 의의는 분명하다. <strong>현대 딥러닝 모델의 풍부한 중간 표현과, 수십 년간 다듬어진 고전 알고리즘(DTW)을 결합하는 깔끔한 본보기</strong>다. raw feature를 쓰는 데에는 추가 학습 비용이 0이다(이미 채보용으로 모델을 돌린다면 부산물이다). 데이터셋 구축 비용도 작다(unaligned 페어만 있으면 fine-tuning이 가능하다). 그러면서 동기화 분야의 오랜 두통—저품질 역사적 녹음에서의 outlier—을 정량적으로 공략한다.</p>
<p>음악 정보 검색 분야에서 이 논문은 한 가지 실용 지침을 분명히 남긴다. <strong>"채보 모델을 어차피 쓸 거면, 그 모델의 마지막 sigmoid 출력을 버리지 말고 동기화에 그대로 먹여라. 그리고 까다로운 데이터에는 unaligned 페어로 한 번 더 적응시켜라."</strong> 단순하지만 강한 권고이고, Sync Toolbox 같은 이미 널리 쓰이는 오픈소스 파이프라인에 즉시 끼워 넣을 수 있다는 점에서 영향력이 클 가능성이 있다. 악보 추종 시스템, 음악학 분석 도구, 음원 분리 전처리—실세계 응용 곳곳에서 raw feature 기반 동기화가 표준 옵션으로 자리잡을 여지가 충분하다.</p>
