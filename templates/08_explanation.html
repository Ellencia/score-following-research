<h2 id="이-논문이-풀려는-문제는-무엇인가">이 논문이 풀려는 문제는 무엇인가</h2>
<p>피아노를 치는 사람 옆에서 컴퓨터가 함께 연주를 한다고 상상해 보자. 사람이 살짝 빠르게 치면 컴퓨터도 따라서 빠르게, 사람이 잠시 머뭇거리면 컴퓨터도 같이 기다려 줘야 한다. 이런 "컴퓨터가 사람의 페이스를 듣고 맞추는" 동반 연주는 1984년부터 연구돼 왔지만, 아직도 사람 반주자만큼 자연스러운 시스템이 일반에 널리 퍼지지는 않았다. Pillay의 카네기멜런 석사 논문(2024)은 이 오래된 꿈을 풀기 위해 <strong>딥러닝</strong>을 본격적으로 끌어들이려 한다.</p>
<p>문제가 어려운 이유는 크게 세 가지다. 첫째, 컴퓨터는 사람의 연주를 마이크로 듣고 "지금 어느 음을 누르는지" 알아내야 한다(채보). 둘째, 그 음들이 <strong>악보의 어느 마디 어느 박자</strong>에 해당하는지 실시간으로 찾아내야 한다(이걸 score following, 우리말로는 악보 추적이라 부른다). 셋째, 그 위치에 맞춰 적절한 시점에 자기 파트를 연주해야 한다(반주 생성). 이 세 단계가 0.005초 안에 일어나야 사람이 자연스럽다고 느낀다.</p>
<p>특히 어려운 게 <strong>폴리포닉(다성)</strong> 처리다. 트럼펫이나 사람 목소리는 한 번에 한 음만 내지만(이걸 monophonic이라 한다), 피아노는 한 번에 다섯 개, 열 개의 음을 동시에 누른다. 게다가 사람은 실수하고 꾸밈음을 즉흥으로 넣고 박자를 마음대로 늘리고 줄인다. 그런 와중에도 컴퓨터는 "지금 악보의 이 지점이야"라고 정확히 짚어야 한다. 1984년 이후 동적계획법, HMM(숨겨진 마르코프 모델), OLTW(온라인 동적 시간 정합) 같은 고전 알고리즘이 차례로 시도됐지만, 다른 분야를 휩쓴 딥러닝은 이 문제에서 거의 활용되지 못했다. 저자는 그 공백을 메우려 한다.</p>
<h2 id="핵심-아이디어를-한-그림으로">핵심 아이디어를 한 그림으로</h2>
<p>저자가 제안한 시스템 <strong>HeurMiT</strong>은 이름 그대로 "휴리스틱(상식적 규칙) + 미니 트랜스폼(작은 신경망 Tyke)"의 합성어다. 큰 그림은 다음과 같다.</p>
<pre class="mermaid"><code>flowchart LR
    A[악보] --&gt; B[지금 위치 근처 일부 잘라내기 - 컨텍스트]
    P[사람 연주 오디오] --&gt; T[BasicPitch로 피아노 롤 변환]
    T --&gt; W[최근 몇 초의 연주 - 윈도우]
    B --&gt; N[작은 신경망 - 잠재 표현으로 압축]
    W --&gt; N
    N --&gt; X[교차상관 - 어디서 가장 잘 겹치나]
    X --&gt; H[상식 규칙 검증 - 너무 튀면 거부]
    H --&gt; R[지금 위치 + 추정 템포]
    R --&gt; D[DAW가 반주 재생]
</code></pre>
<p>비유하자면 이렇다. 누군가 책을 읽고 있고, 당신은 옆에서 같은 책의 같은 줄을 손가락으로 짚어가야 한다고 하자. 매번 책 전체를 처음부터 훑는 건 비효율적이다. 보통은 "방금까지 짚었던 줄 근처"만 본다(컨텍스트). 그리고 상대가 방금 소리 낸 단어 몇 개를 머리에 담아둔다(윈도우). 두 부분을 빠르게 비교해서 "그 단어 몇 개와 가장 잘 맞는 위치"를 찾는다(교차상관). 가끔 발음을 더듬거나 단어를 빼먹어도 흐름을 잃지 않으려면, "원래 사람은 책을 앞으로 읽는 법이지 갑자기 50줄 뒤로 점프하지 않는다" 같은 상식이 필요하다(휴리스틱). HeurMiT는 이 모든 단계를 컴퓨터화한 셈이다.</p>
<p>신경망 부분(Tyke, 그중 채택된 작은 버전 MiniTyke)은 작다. 입력으로 들어온 피아노 롤을 1차원 합성곱(1D-CNN) 한 층으로 압축해서 "음 높이 차원은 줄이고 시간 차원은 그대로 둔" 잠재 표현을 만든다. 그러면 비교가 빠르고, 사람 실수에도 좀 둔감해진다. 학습할 때는 자체 라이브러리 <strong>MIDIOgre</strong>로 일부러 음 높이 살짝 옮기기, 음 길이 늘리기, 음 빼기, 음 추가하기 같은 변형을 무작위로 입혀서 "이런 종류의 어긋남도 무시하라"고 가르친다.</p>

<h2 id="이-논문의-새로운-점">이 논문의 새로운 점</h2>
<p>악보 추적은 1984년 이후 거의 40년 동안 동적계획법, HMM, OLTW 같은 "비-신경망" 알고리즘이 주력이었다. 이미지·언어·음성에서 딥러닝이 모든 걸 갈아치우는 동안에도, 이 분야에서는 신경망이 본격적으로 자리잡지 못했다. 본 논문이 새로운 지점은 다음 네 가지다.</p>
<p>첫째, <strong>딥러닝을 1차 엔진으로 둔 score follower</strong>다. Tyke 신경망이 학습한 잠재 표현 위에서 교차상관과 분류 손실로 위치를 추정한다. 둘째, <strong>폴리포닉 입력을 처음부터 1급 시민으로 다룬다</strong>. 모든 처리가 128행 피아노 롤 위에서 일어나기 때문에 동시 음 처리가 자연스럽다. 셋째, <strong>MIDIOgre라는 MIDI 전용 데이터 증강 라이브러리</strong>를 만들어 공개했다. 사람이 자주 저지르는 다섯 가지 실수(음 높이 변경·온셋 시간 이동·음 길이 변화·음 추가·음 삭제)를 무작위로 흉내 내며 학습 데이터를 무한 확장한다. 넷째, **추론이 $O(1)$**이다. 곡이 길어져도 매 순간의 계산량이 일정해 매우 가볍다. NVIDIA RTX 3060 모바일 GPU에서 추론 지연이 약 1.1 ms로 사람이 자각할 수 없는 수준이다.</p>
<h2 id="한계와-의의">한계와 의의</h2>
<p>저자 자신이 "지금 형태로는 실전 투입은 어렵다"고 명확히 인정한다. 가장 큰 약점은 <strong>템포 민감성</strong>이다. 연주가 악보의 메트로놈 표시보다 5 BPM만 어긋나도 추적이 절반 이상 무너진다. 이는 교차상관이 본질적으로 시간 축의 늘이고 줄임에 강건하지 않기 때문이며, MiniTyke의 커널 크기가 3밖에 안 되는 점도 한계다. 또한 저자가 도입한 다섯 가지 MIDIOgre 증강은 ablation에서 의미 있는 차이를 만들어내지 못했다. 휴리스틱 역시 "곡마다 살짝 튜닝"해야 좋은 결과가 나오는, 즉 연주별 적응이 필요한 형태로 남았다. 듣기 평가에서도 일부 곡(P25, P39, P41)은 안정 단계를 지나기 전에 추적을 놓쳤고, 일부 곡(P11, P21, P43)에서는 빠른 패시지에 약간의 지연이 느껴졌다.</p>
<p>그럼에도 이 작업의 의의는 분명하다. 첫째, <strong>딥러닝 score follower의 출발선</strong>으로서, 이후 연구가 무엇을 베이스라인으로 삼고 어떤 평가 지표(misalign rate, alignment error, latency)와 어떤 데이터(MAESTRO, (n)ASAP)를 써야 하는지 구체적으로 보여준다. 둘째, <strong>MIDIOgre 라이브러리</strong>는 본 논문의 결론과 별개로 다른 폴리포닉 MIDI 학습 과제(자동 채보, 음악 생성, 표현 분석 등)에 즉시 재사용 가능한 도구다. 셋째, 6장의 후속 연구 로드맵—온셋 전용 교차상관, 멀티스케일 비교, 글로벌 재정렬용 이진 분류기, LSTM/Transformer 기반 시퀀스 정합으로의 전환—은 그 자체로 후학들에게 명확한 이정표가 된다. 넷째, <strong>추론이 $O(1)$이고 지연이 ms 단위</strong>라는 점은, 실연 무대보다 훨씬 부드러운 환경(연습실, 음악 교육 앱, 자동 페이지 넘김 도구) 같은 응용에서는 지금 이대로도 가치가 있다.</p>
<p>요약하면 본 논문은 "딥러닝으로 사람과 함께 연주하는 컴퓨터를 만들겠다"는 큰 약속을 일부만 지킨 솔직한 1차 시도다. 그러나 그 시도 자체가, 그리고 그 시도에서 얻은 실패의 정직한 보고가 후속 연구가 발 디딜 단단한 첫 발판을 제공한다. 사람과 컴퓨터가 한 무대 위에서 정말 자연스럽게 함께 연주하기까지는 아직 더 가야 하지만, 이제 그 길의 출발점이 어디인지는 분명해졌다.</p>
