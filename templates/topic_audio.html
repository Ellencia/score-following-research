<h2 id="챕터-0-시작하기-전에">[챕터 0] 시작하기 전에</h2>
<p>안녕하세요. 지금부터 약 30분 동안, "스코어 팔로잉"이라는 연구 분야를 논문 열세 편으로 정리해 드리겠습니다.</p>
<p>스코어 팔로잉, 우리말로 풀면 "악보 따라가기"입니다. 사람이 악기를 연주하면, 컴퓨터가 그 소리를 듣고 "지금 악보의 어느 위치를 연주하고 있는지"를 실시간으로 짚어내는 기술입니다. 가장 친숙한 응용이 바로 자동 페이지 넘김, 즉 전자 악보가 연주를 따라가며 알아서 페이지를 넘겨 주는 기능이죠. 그 밖에도 자동 반주, 콘서트 자막 동기화, 연습 보조 같은 데에 쓰입니다.</p>
<p>이 정리에는 두 가지 목적이 있습니다. 첫째는 분야 전체의 지도를 그리는 것이고, 둘째는 그 지도를 바탕으로 직접 페이지 터너 애플리케이션을 만들 길을 찾는 것입니다. 그래서 뒤쪽 챕터에서는 연구 이야기에서 실제 제작 이야기로 넘어갑니다.</p>
<p>열세 편은 2016년부터 2025년까지 약 10년에 걸쳐 있습니다. 그중 아홉 편이 2024년까지의 연구이고, 나머지 네 편이 2025년에 쏟아진 최신 작업입니다. 이 "9 더하기 4"라는 구조를 기억해 두시면 이야기 전체가 훨씬 잘 잡힙니다.</p>
<h2 id="챕터-1-분야의-두-노선">[챕터 1] 분야의 두 노선 — 고전 신호 처리와 학습 기반</h2>
<p>먼저 2024년까지의 아홉 편입니다. 이 아홉 편은 알고리즘의 성격에 따라 자연스럽게 두 갈래로 나뉩니다.</p>
<p>첫 번째 갈래는 "고전 신호 처리 노선"입니다. 여기서는 사람이 손으로 설계한 음향 특징, 예를 들어 음의 높낮이 분포나 음이 시작되는 순간 같은 것을 입력으로 삼고, "동적 시간 워핑", 영어로 디 티 더블유라고 부르는 정렬 알고리즘으로 악보와 연주를 맞춥니다. 동적 시간 워핑은 쉽게 말해, 빠르게 치든 느리게 치든 두 시간 축을 신축성 있게 늘이고 줄여서 가장 잘 맞는 대응을 찾는 방법입니다.</p>
<p>이 갈래의 출발점이자 종합판이 2016년 아르츠의 박사 논문입니다. 오스트리아 린츠의 요하네스 케플러 대학교, 줄여서 제이케이유에서 나왔습니다. 아르츠는 정렬 알고리즘에 템포 모델, 거리 정규화, 여러 연주본 참조, 곡 자동 식별, 그리고 여러 가설을 동시에 추적하는 기법까지 한 시스템 안에 모았습니다. 이후 모든 논문이 "디 티 더블유 시대의 종합 기준선"으로 이 논문을 인용합니다.</p>
<p>같은 갈래의 후속들을 보면, 2022년 영국 임페리얼 칼리지의 학부 졸업 프로젝트인 리의 작업이 있습니다. 리는 정렬 알고리즘은 그대로 두고 입력 특징만 바꿔 끼워, "특징 선택이 성능을 얼마나 좌우하는가"를 깔끔하게 보여 줬습니다. 2024년 독일 에를랑겐의 차이틀러는 한 걸음 더 나아갑니다. 사람이 만든 특징 대신, 신경망 전사 모델이 만들어 낸 확률값을 그대로 정렬에 집어넣었습니다. 여기서 "전사"란 오디오를 듣고 어떤 음이 언제 울렸는지를 음표로 받아 적는 일을 말합니다. 같은 해 미국 카네기멜런 대학교의 부키가 발표한 "그냥 반복만 라벨링하라", 영어 약자로 제이 엘 티 알이라는 작업도 비슷한 사상을 오프라인 정렬에 가져옵니다.</p>
<p>두 번째 갈래는 "학습 기반 노선"입니다. 2016년 도르퍼의 논문에서 시작합니다. 이 논문의 핵심 슬로건은 단 하나, "악보를 기호로 바꾸지 말고 이미지 그대로 보자"입니다. 그전까지는 악보를 미디나 뮤직엑스엠엘 같은 기호 형식으로 미리 변환해 두어야 했는데, 도르퍼는 악보 사진과 소리 스펙트로그램을 신경망에 직접 집어넣어 위치를 맞히게 했습니다.</p>
<p>그 뒤로 같은 제이케이유 그룹이 거의 한 사람의 박사 연구처럼 한 해에 한 단계씩 발전시킵니다. 2018년 도르퍼는 똑같은 신경망 뼈대를 두고 학습 방식만 강화학습으로 바꿉니다. 악보 따라가기를, 매 순간 어디로 얼마나 빨리 움직일지 결정하는 일종의 게임으로 재정의한 것이죠. 이 작은 변경만으로 완주율이 0.43에서 0.96으로 뛰었습니다. 분야의 진짜 병목이 알고리즘 그 자체에 있었다는 증거입니다.</p>
<p>2020년 헨켈은 입력을 악보 조각에서 페이지 전체로 키웠고, 2021년 헨켈은 그 출력을 하나의 네모 상자, 즉 바운딩 박스로 단순화하면서, 학습할 때 다양한 잔향을 입혀 합성 데이터와 실제 녹음 사이의 간극을 절반 가까이 메웠습니다. 2024년 카네기멜런의 필레이는 같은 학습 노선이되, 가벼운 신경망과 교차상관 기법을 써서 추론 지연을 1밀리초 수준까지 줄였습니다.</p>
<p>두 노선의 차이는 근본적입니다. 고전 노선은 정렬의 비용 함수가 투명하고 통제 가능하지만, 입력 특징의 표현력이 한계가 됩니다. 학습 노선은 데이터로 그 한계를 깰 수 있지만, 대신 합성 환경에 과적합되거나 반복 구간에서 엉뚱한 데로 건너뛰는 새로운 실패를 떠안습니다. 그리고 앞선 아홉 편을 함께 읽으면 분명해지는 사실 하나가 있습니다. 두 노선이 점점 섞이고 있다는 것입니다. 차이틀러는 학습된 전사 결과를 고전 정렬에 끼워 넣었고, 필레이는 신경망에 휴리스틱 규칙을 결합했으며, 부키는 학습된 표상에 사람의 라벨링까지 더했습니다.</p>
<h2 id="챕터-2-2025년-차세대-네-갈래">[챕터 2] 2025년, 차세대 네 갈래</h2>
<p>이제 2025년에 발표된 최신 네 편입니다. 이 네 편은 앞의 두 갈래 어디에도 깔끔하게 들어가지 않습니다. 분야의 다음 10년을 결정할 네 가지 흐름이 한꺼번에 갈라져 나온 것이라고 보면 됩니다.</p>
<p>첫째, 표준화된 평가 인프라입니다. 카이스트와 제이케이유가 공동으로 낸 "매치메이커"입니다. 이 분야는 40년 동안 공통의 평가 기준이 없었습니다. 매치메이커는 세 가지 대표 알고리즘을 같은 인터페이스로 구현하고, 184개의 연주 위에서 공평하게 비교했습니다. 결론은 명확합니다. 아르츠 방식의 온라인 정렬에 로그 스펙트럼 에너지 특징을 붙인 조합이 정확도와 지연 모두에서 가장 균형 잡힌 기준선이라는 것입니다. 게다가 매치메이커는 단 두 줄짜리 에이피아이로 제공돼, 이제 개발자가 악보 따라가기를 박사과정 통째 작업이 아니라 라이브러리 한 줄 호출로 다룰 수 있게 됐습니다.</p>
<p>둘째, "전사한 다음 추적하기" 패러다임입니다. 영어로는 트랜스크라이브 댄 트랙입니다. 제이케이유의 피터 연구진은 먼저 한 가지를 정량으로 증명합니다. 오디오를 직접 정렬하는 방식이 정확도의 천장, 즉 플래토에 도달했다는 사실입니다. 그러고 나서 그 천장을 뚫는 새 방법을 제시합니다. 오디오를 일단 음표 시퀀스로 바꾼 뒤, 기호 영역에서 정렬하는 것입니다. 그 결과 강건성이 약 92퍼센트, 그리고 오차 100밀리초 이내 비율이 88퍼센트로, 오디오만 쓰는 기준선을 큰 폭으로 앞섰습니다.</p>
<p>셋째, 저지연 실시간 전사입니다. 제이케이유의 후 연구진은 그동안 분야가 무비판적으로 써 온 "온라인"이라는 말을 정조준합니다. 어떤 모델은 지연이 174밀리초라고 보고했지만, 그 안에 10초짜리 미리보기가 숨어 있었다는 점을 폭로합니다. 그리고 인과성을 엄격히 지키면서도 30밀리초 지연에서 거의 같은 정확도를 낼 수 있음을 보입니다. 다만 10밀리초까지 줄이면 정확도 손실이 크다는 부정적 결과도 정직하게 보고합니다.</p>
<p>넷째, 트랜스포머와 반복 기호 처리를 한 모델에 통합한 작업입니다. 영국 퀸메리 대학교의 "루마"입니다. 하나의 트랜스포머로 정렬, 전사, 그리고 실수 검출이라는 세 가지 일을 동시에 처리합니다. 특히 사람이 미리 펼쳐 두지 않아도 악보의 반복 기호를 그대로 처리합니다. 반복이 없는 악보에서는 기존 최고 성능과 1퍼센트 차이로 거의 동급이고, 반복이 있는 악보에서는 기준선이 12점대로 무너질 때 루마는 98점대를 유지합니다. 다만 1분 단위 청크와 피아노 솔로에 한정된다는 한계가 있습니다.</p>
<p>이 네 편을 하나로 묶는 가장 자연스러운 해석은 이렇습니다. 매치메이커는 뒷단 라이브러리, 피터의 작업은 그 안에 끼울 가장 정확한 정렬 모듈, 후의 작업은 그 모듈의 저지연 전사 부품, 루마는 곡을 추가할 때 반복을 자동 처리하는 사전 정렬기. 네 편이 곧 한 응용 스택의 네 부품이라는 것입니다.</p>
<h2 id="챕터-3-표상의-진화">[챕터 3] 악보를 어떻게 보여줄 것인가 — 표상의 진화</h2>
<p>잠깐, 분야 전체를 관통하는 한 줄기를 짚고 가겠습니다. 바로 "악보를 컴퓨터에게 어떻게 보여 주는가"입니다. 이 표상이 시대마다 달라졌고, 그 변화가 곧 분야의 줄거리입니다.</p>
<p>처음에는 기호 표현이었습니다. 미디나 뮤직엑스엠엘처럼 컴퓨터가 바로 읽을 수 있는 형식이죠. 정확하지만, 사람이 미리 입력하거나 광학 악보 인식으로 변환해 두어야 하는 비용이 듭니다. 아르츠, 리, 차이틀러, 필레이가 여기에 속합니다.</p>
<p>다음 단계는 악보 이미지입니다. 도르퍼가 연 길이죠. 악보를 픽셀 그대로 입력해서 기호 변환을 통째로 건너뜁니다. 도르퍼 두 편과 헨켈 두 편, 그리고 부키가 여기에 속합니다.</p>
<p>가장 최근은 "전사로 만든 부드러운 피아노 롤"입니다. 오디오에서 신경망이 뽑아낸 음표 확률을, 임계값으로 자르지 않고 그대로 정렬 특징으로 씁니다. 차이틀러와 부키가 이 제3의 표상을 씁니다. 흥미로운 점은, 에를랑겐과 카네기멜런이라는 서로 다른 두 그룹이 같은 해에 서로를 인용하지도 않은 채 똑같은 발견에 도달했다는 것입니다. "임계값으로 자르기 전의 전사 확률 자체가 이미 훌륭한 정렬 특징이다." 분야의 표상 패러다임이 막 바뀌고 있다는 신호죠.</p>
<p>요약하면 이렇습니다. 처음에는 사람이 악보를 미리 정리해 줘야 했고, 다음에는 사진 한 장이면 충분하도록 학습으로 그 차이를 흡수했으며, 이제는 오디오에서 추출한 학습된 표현이 다시 악보 쪽 표현으로 회수되는 단계로 가고 있습니다.</p>
<h2 id="챕터-4-풀린-문제와-풀리지-않은-문제">[챕터 4] 풀린 문제와 풀리지 않은 문제</h2>
<p>열세 편을 함께 읽으면, 분야가 풀어낸 것과 여전히 열려 있는 것이 분명히 갈립니다.</p>
<p>먼저 풀린, 또는 적어도 통제된 문제들입니다. 단순한 단성 정렬은 사실상 해결됐습니다. 광학 악보 인식 의존성도 도르퍼와 헨켈의 이미지 노선으로 상당히 걷어냈습니다. 다성, 즉 여러 음이 동시에 울리는 환경도 2018년 이후 모든 학습 기반 논문이 기본으로 다룹니다. 출력 표현을 어떻게 잡을지의 문제도, 단순한 일차원 구간에서 이차원 분할로, 다시 네모 상자로 옮겨 가며 정리됐습니다. 그리고 반복 구간에서 엉뚱하게 건너뛰는 문제는, 부키가 "사람이 페이지당 6초만 클릭해서 반복 구조를 알려 준다"는 우회 해법으로 사실상 운영 가능한 수준에서 닫았습니다.</p>
<p>다음은 아직 풀리지 않은 문제들입니다. 첫째, 합성 데이터와 실제 녹음 사이의 간극입니다. 헨켈의 경우 방 안에서 마이크로 녹음한 환경의 정확도가 합성 환경의 절반 이하로 떨어졌습니다. 잔향을 입히는 기법으로 끌어올렸지만 여전히 합성 환경에는 못 미칩니다. 둘째, 반복이나 도돌이, 다 카포, 카덴차 같은 구조적 변형의 자동 처리입니다. 부키는 아예 자동 처리를 포기하고 사람의 라벨링으로 대체했습니다. "사람을 빼는" 마지막 한 발자국은 여전히 열려 있습니다. 셋째, 비서양 음악과 비클래식 음악입니다. 열세 편 중 어느 것도 재즈, 팝, 즉흥 연주, 비서양 전통음악을 본격적으로 평가하지 않았습니다. 넷째, 정밀도와 강건성의 동시 달성입니다. 열세 편 어느 것도 "0.05초 이하의 정확도를 80퍼센트 이상, 그것도 방 안 녹음에서, 그것도 실시간으로" 동시에 충족했다고 주장하지 않습니다.</p>
<p>여기서 부키의 작업이 던지는 한 가지 새로운 관점이 중요합니다. "완전 자동화가 분야의 유일한 목표일 필요는 없다"는 것입니다. 페이지당 단 6초의 클릭이 정확도를 33퍼센트에서 82퍼센트로 끌어올린다면, 자동화율을 조금 양보하고 정확도를 결정적으로 높이는 사람과 기계의 협업 설계가, 적어도 어떤 응용에서는 더 합리적인 절충일 수 있습니다.</p>
<h2 id="챕터-5-연구에서-제작으로">[챕터 5] 연구에서 제작으로 — 페이지 터너 애플리케이션</h2>
<p>이제 연구 이야기를 실제 제작으로 옮겨 보겠습니다. 이 모든 정리는 결국 한 가지 실용적 질문에 답하기 위한 것이었습니다. "페이지 터너 애플리케이션의 뒷단을 어떻게 구성할 것인가."</p>
<p>악기에 따라 자원의 성숙도가 크게 다릅니다. 피아노는 매우 성숙해서 즉시 구현 가능합니다. 일렉기타는 자료가 막 갖춰진 시점이라 약간의 추가 학습이 필요합니다. 바이올린은 부분적인 기준선만 있고, 첼로는 사실상 분야의 빈 공간입니다. 첼로 전용 시스템이나 데이터셋이 열세 편 어디에도 없습니다. 뒤집어 말하면, 첼로용 애플리케이션을 만드는 일 자체가 곧 분야에 대한 기여가 된다는 뜻입니다.</p>
<p>피아노 기준으로 권장 스택은 단순합니다. 매치메이커를 뒷단으로 두고, 아르츠 방식 정렬에 로그 스펙트럼 에너지 특징을 씁니다. 그리고 부키의 반복 라벨링 방식을 빌려, 사용자가 곡을 처음 등록할 때 페이지당 6초 클릭으로 반복 구조를 알려 주면 그다음부터는 자동으로 따라갑니다. 정확도를 더 높이고 싶으면 정렬 모듈을 피터의 "전사한 다음 추적하기"로 교체하면 됩니다. 이때 100밀리초 이내 정확도가 73퍼센트에서 88퍼센트로 도약합니다.</p>
<p>페이지 전환은 이렇게 설계합니다. 페이지 경계 몇 마디 전부터 다음 페이지를 미리 띄울 준비를 하고, 마지막 박자에 들어설 때 부드럽게 넘깁니다. 다만 연주자가 페르마타로 음을 길게 끌거나 점점 느려질 때 성급하게 넘기지 않도록, "지금 박자에 도달했는가"만 보지 말고 "지금 템포가 정상 범위인가"를 함께 봅니다. 그리고 추적을 놓쳤을 때를 대비해, 화면을 한 번 탭하면 "지금 여기서 다시 시작"하도록 재동기화 버튼을 둡니다. 발 페달이나 음성 명령을 보조 수단으로 두면 1초 안에 복구할 수 있습니다.</p>
<h2 id="챕터-6-6주-mvp">[챕터 6] 가장 작은 첫걸음 — 6주 MVP</h2>
<p>만약 직접 만들어 보고 싶다면, 단독 개발자 기준으로 4주에서 6주짜리 최소 기능 제품, 즉 엠브이피를 권합니다. 악기는 일렉기타를 먼저 권합니다. 이유는 세 가지입니다. 다이렉트 인풋 신호로 방 안 음향의 변수를 우회할 수 있고, 학습용 데이터셋과 모델이 이미 공개돼 있으며, 코드는 음의 높낮이 분포에 비교적 잘 잡히기 때문입니다.</p>
<p>엠브이피의 합격선은 다섯 가지를 동시에 만족하는 것입니다. 악보 한 곡을 끝까지 자동으로 따라갈 것, 반복이나 점프가 한 번 이상 들어 있을 것, 사용자가 손대지 않아도 페이지가 자동 전환될 것, 추적을 잃었을 때 1초 안에 복구 가능할 것, 그리고 데모 환경에서 다섯 번 중 네 번은 곡 끝까지 따라갈 것. 이 다섯이 안 되면 그건 엠브이피가 아니라 프로토타입입니다.</p>
<p>이번 주말에 당장 뭔가 보여주고 싶다면, 사흘짜리 데모면 충분합니다. 첫째 날, 매치메이커를 설치하고 예제 노트북으로 합성 피아노 오디오 정렬 결과를 콘솔에 띄웁니다. 둘째 날, 자기 일렉기타로 반복 없는 짧은 곡을 깨끗한 톤으로 녹음하고, 악보를 만들어 정렬한 뒤 현재 박자 위치를 1초마다 출력합니다. 셋째 날, 그 위치를 한 페이지짜리 화면 위에 빨간 커서로 시각화합니다. 이 사흘이면 "매치메이커 위에서 일렉기타 추적이 작동한다"는 사실을 시연할 수 있습니다.</p>
<p>반대로, 엠브이피 단계에서 욕심내지 말아야 할 것도 분명합니다. 광학 악보 인식, 추가 전사 모델 학습, 무대나 협주곡 시나리오, 카메라나 센서, 강한 디스토션 환경, 모바일 앱. 이 여섯 가지를 단기에 끌어들이면 6주가 6개월이 됩니다. 또한 처음부터 못 할 가능성이 높은 곡 조건도 미리 인정합니다. 디스토션이 강한 곡, 비브라토가 심한 솔로, 자유 템포가 큰 곡, 페이지 끝에 페르마타가 있는 곡. 그래서 시연 곡은 이 네 조건의 정반대로, 깨끗한 톤에 비브라토가 적고 템포가 안정적이며 페이지 끝에 늘임표가 없는 곡으로 고릅니다.</p>
<h2 id="맺음말-한-문장으로">[맺음말] 한 문장으로</h2>
<p>스코어 팔로잉이라는 한 문제를, 2016년 아르츠가 모듈형 동적 시간 워핑 시스템으로 종합한 뒤, 같은 제이케이유 그룹이 악보 이미지 학습 노선을 5년에 걸쳐 다듬었고, 외부 그룹들이 학부 테스트벤치와 전사 특징과 신경 매처, 그리고 사람과 기계의 협업으로 비판하고 확장했습니다. 그리고 2025년, 제이케이유의 세 편과 퀸메리의 한 편이 동시에 등장하면서, 분야는 다음 10년의 응용 스택을 위한 네 부품을 한꺼번에 내놓았습니다. 그 모든 변화의 밑바탕에는, "오디오를 직접 정렬하는 방식이 정확도의 천장에 도달했고, 이제는 전사한 다음 추적하는 쪽으로 무게중심이 옮겨갔다"는 한 줄의 진단이 있습니다.</p>
<p>여기까지입니다. 더 깊이 들어가고 싶은 논문이 생겼다면, 이 페이지에서 그 논문의 분석 보고서와 비전공자 해설을 펼쳐 보시면 됩니다. 들어 주셔서 감사합니다.</p>
