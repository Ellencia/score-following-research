<template id="doc-00_glossary" data-title="마스터 용어집" data-docx="00_마스터_용어집.docx"><h1 id="score-following-연구-마스터-용어집">Score Following 연구 마스터 용어집</h1>
<p>이 용어집은 Score Following 분야의 13편 논문 해설 문서에서 사용된 핵심 용어를 통합·정리한 자료다. 1984년 이후 약 40년에 걸쳐 발전한 이 분야는 고전적 신호 처리·통계 모델에서 시작해 오늘날에는 딥러닝, 강화학습, 객체 검출, 그리고 transformer + native MusicXML 결합까지 흡수하면서 빠르게 진화하고 있다. 그 결과 같은 "악보 따라가기"라는 한 가지 문제를 두고 매우 다른 어휘가 함께 등장한다. 9번째 논문(Bukey 2024, JLTR)은 실시간 score following이 아닌 <strong>오프라인 audio-to-score alignment</strong>를 다루어, 연주가 끝난 뒤 녹음 전체를 보고 가장 정확한 정렬을 만들어 내는 인간 개입 학습(human-in-the-loop) 접근을 제시한다. 10-13번 논문(Park 2025 Matchmaker, Peter 2025 Transcribe-and-Track, Hu 2025 Low-Latency AMT, Chang 2025 RUMAA)은 2025년 분야의 흐름을 결정하는 네 갈래 — 표준화된 평가 인프라, transcribe-then-track 패러다임, 저지연 AMT, transformer 통합 모델 — 을 각각 대표한다.</p>
<p>각 용어는 일상에서 끌어올 수 있는 비유와 함께 설명했고, 어떤 논문에서 등장했는지를 끝 컬럼에 표시했다. 등장 논문 번호는 1=Arzt2016, 2=Dorfer2016, 3=Dorfer2018, 4=Henkel2020, 5=Henkel2021, 6=Lee2022, 7=Zeitler2024, 8=Pillay2024, 9=Bukey2024, 10=Park2025_Matchmaker, 11=Peter2025_TranscribeTrack, 12=Hu2025_LowLatencyAMT, 13=Chang2025_RUMAA 순이다. 비전공자가 한 분야를 처음 훑어볼 때, 이 용어집을 옆에 두고 각 논문 해설을 읽으면 낯선 단어 때문에 막히는 일이 줄어들 것이다.</p>
<h2 id="1-문제-정의-관련-용어">1. 문제 정의 관련 용어</h2>
<table>
<thead>
<tr class="header">
<th>용어</th>
<th>영문</th>
<th>직관적 설명</th>

</tr>
</thead>
<tbody>
<tr class="odd">
<td>악보 따라가기 / 음악 추적</td>
<td>Score Following / Music Tracking</td>
<td>컴퓨터가 마이크로 들어오는 라이브 연주를 들으며, 매 순간 연주자가 악보의 어느 마디·어느 음을 치고 있는지 실시간으로 짚어내는 기술. 노래방 화면이 가사를 따라가는 것의 음악 버전이라고 보면 된다.</td>
<td>1,2,3,4,5,6,7,8</td>
</tr>
<tr class="even">
<td>작품 식별</td>
<td>Score Identification</td>
<td>들리는 음악이 도대체 어느 작품인지 자체를 알아내는 단계. 곡명을 모를 때 도서관에서 곡 제목부터 찾아주는 사서의 일에 해당한다.</td>
<td>1</td>
</tr>
<tr class="odd">
<td>악보 위치</td>
<td>Score Position</td>
<td>특정 작품 안에서의 정확한 마디·박자 좌표. 지도로 치면 도시 이름을 넘어 그 도시의 어느 골목 어느 번지수까지 찍는 일이다.</td>
<td>1,2,4,5,8</td>
</tr>
<tr class="even">
<td>오디오–악보 정렬</td>
<td>Audio-to-Score Alignment</td>
<td>녹음된 음악과 악보 위 위치를 짝짓는 일. 영화의 자막을 장면과 맞추는 일의 음악 버전이다. 오프라인 정렬(녹음 전체를 보고 사후에 가장 정확하게 맞춤, 본 분야의 9번째 논문 Bukey 2024가 대표)과 온라인 정렬(실시간 score following)로 나뉜다.</td>
<td>1,2,6,7,9</td>
</tr>
<tr class="odd">
<td>오디오 동기화</td>
<td>Audio Synchronization</td>
<td>같은 곡의 두 녹음(또는 악보와 녹음)을 같은 시간자 위에 올려놓고, "여기 이 시점이 저쪽 그 시점"이라고 대응시키는 작업.</td>
<td>7</td>
</tr>
<tr class="even">
<td>자동 페이지 넘김</td>
<td>Automatic Page Turning (APT)</td>
<td>손이 바쁜 연주자를 위해 태블릿이 알아서 악보를 넘겨주는 기능. 이 분야의 가장 친숙한 응용 중 하나다.</td>
<td>1,3,4,5,6,8</td>
</tr>
<tr class="odd">
<td>컴퓨터 반주</td>
<td>Computer Accompaniment</td>
<td>사람이 솔로를 치면 컴퓨터가 반주를 따라 쳐 주는 시스템. 1984년 이 분야의 출발점이 되었다.</td>
<td>1,3,5,6,8</td>
</tr>
<tr class="even">
<td>다성 음악</td>
<td>Polyphonic Music</td>
<td>여러 성부 또는 여러 음이 동시에 울리는 음악. 피아노가 대표적이다. 단성 매칭만으로는 따라잡기 어렵다.</td>
<td>3,5,6,8</td>
</tr>
<tr class="odd">
<td>단성 음악</td>
<td>Monophonic Music</td>
<td>한 번에 한 음만 울리는 멜로디. 누가 휘파람을 부는 상황을 떠올리면 된다. 트럼펫·플루트·사람 목소리가 대표적이다.</td>
<td>2,3,8</td>
</tr>
<tr class="even">
<td>자연 환경</td>
<td>In-the-Wild</td>
<td>합성 MIDI나 깨끗한 스튜디오 녹음 같은 인공 데이터가 아니라, 실제 콘서트 녹음 + 사람이 스캔한 종이 악보처럼 잡음과 변형이 섞인 진짜 데이터를 가리키는 표현. Bukey 2024는 이 환경의 오프라인 정렬을 목표로 한다.</td>
<td>9</td>
</tr>
<tr class="odd">
<td>반복 기호 / 점프</td>
<td>Repeat Sign / Jump</td>
<td>악보에서 "이 부분을 다시 한 번", "처음으로 돌아가서"를 뜻하는 기호. 같은 마디 그림이 시간선상 두 번 이상 연주되게 만들어, 정렬 시 "녹음의 어느 구간이 몇 번째 연주인지"를 가려내야 하는 문제를 일으킨다.</td>
<td>9</td>
</tr>
</tbody>
</table>
<h2 id="2-고전적-정렬추적-알고리즘">2. 고전적 정렬·추적 알고리즘</h2>
<table>
<thead>
<tr class="header">
<th>용어</th>
<th>영문</th>
<th>직관적 설명</th>
<th>등장 논문</th>
</tr>
</thead>
<tbody>
<tr class="odd">
<td>동적 시간 휨</td>
<td>Dynamic Time Warping (DTW)</td>
<td>두 시계열을 시간 축에서 늘리고 줄이며 가장 잘 겹치게 맞추는 방법. 같은 곡이라도 사람마다 빠르기가 달라 길이가 다른데, 한쪽 시간 축을 고무줄처럼 늘려 다른 쪽과 정렬한다. 1970년대 음성 인식에서 출발했다.</td>
<td>1,2,3,6,7,9</td>
</tr>
<tr class="even">
<td>실시간 DTW</td>
<td>On-line DTW (OLTW)</td>
<td>일반 DTW가 녹음 끝난 뒤 전체를 한 번에 정렬하는 데 비해, 들어오는 신호에 즉시 한 프레임씩 정렬을 갱신하는 변형. 2005년 Dixon이 제안했고 score following의 1세대 강력한 베이스라인이다.</td>
<td>1,6,8</td>
</tr>
<tr class="odd">
<td>역방향 경로</td>
<td>Backward Path</td>
<td>정렬 결과를 현재 시점에서 거꾸로 거슬러 그려본 자취. 앞만 보고 추정하기보다 한 박자 늦게라도 뒤를 돌아보면 템포를 더 정확히 가늠할 수 있다는 직관을 활용한다.</td>
<td>1</td>
</tr>
<tr class="even">
<td>멀티스케일 DTW</td>
<td>MrMsDTW</td>
<td>큰 단위에서 거친 정렬을 잡고 점점 세밀하게 좁혀가는 효율적 변형. Sync Toolbox에 구현되어 있다.</td>
<td>7</td>
</tr>
<tr class="odd">
<td>은닉 마르코프 모델</td>
<td>Hidden Markov Model (HMM)</td>
<td>보이지 않는 상태(악보 위치)를 확률적으로 추정하는 고전 통계 모델. 음표 진행을 상태 전이로 본다.</td>
<td>2,8</td>
</tr>
<tr class="even">
<td>근사 문자열 매칭</td>
<td>Approximate String Matching (ASM)</td>
<td>두 문자열의 거의 비슷한 매칭을 찾는 알고리즘. 자동 맞춤법 검사기처럼 음표 줄을 글자열로 보고 닮은 짝짓기를 찾는다. Needleman-Wunsch 같은 편집 거리 계열이 대표적이다.</td>
<td>6</td>
</tr>
<tr class="odd">
<td>템포 모델</td>
<td>Tempo Model</td>
<td>지금 연주가 빠른지 느린지를 추정하고 다음 위치 예측에 반영하는 보조 장치. 메트로놈을 머릿속에 굴리는 부지휘자의 역할이다.</td>
<td>1</td>
</tr>
<tr class="even">
<td>템포 곡선</td>
<td>Tempo Curve</td>
<td>한 곡이 진행되는 동안 빠르기가 어떻게 변했는지를 그린 그래프. 같은 쇼팽 곡이라도 연주자마다 곡선 모양이 꽤 다르다.</td>
<td>1</td>
</tr>
<tr class="odd">
<td>박 추적</td>
<td>Beat Tracking</td>
<td>음악에서 박이 어디 있는지 찾는 일. 사용자가 휴대폰을 박자에 맞춰 흔드는 식으로 직접 알려주는 단순 형태도 있다.</td>
<td>6</td>
</tr>
<tr class="even">
<td>다중 에이전트 가설 추적</td>
<td>Multi-agent Hypothesis Tracking</td>
<td>여러 가능성을 동시에 살려 두고 시간이 지나면서 점수가 높은 가설만 남기는 방식. 형사 여러 명이 동시에 다른 용의자를 탐문하다 증거가 쌓이는 쪽으로 수사력을 모으는 모습과 비슷하다.</td>
<td>1</td>
</tr>
<tr class="odd">
<td>휴리스틱</td>
<td>Heuristic</td>
<td>"보통은 이렇다"는 상식적 규칙. 단조 증가, 변화율 제한 등이 score follower의 휴리스틱으로 자주 쓰인다.</td>
<td>8</td>
</tr>
</tbody>
</table>
<h2 id="3-신호-처리특징량">3. 신호 처리·특징량</h2>
<table>
<thead>
<tr class="header">
<th>용어</th>
<th>영문</th>
<th>직관적 설명</th>
<th>등장 논문</th>
</tr>
</thead>
<tbody>
<tr class="odd">
<td>스펙트로그램</td>
<td>Spectrogram</td>
<td>시간이 가로축, 주파수가 세로축인 소리의 사진. 1초 분량의 소리가 어떻게 변했는지를 한 장의 이미지로 볼 수 있다. 신경망이 오디오를 "이미지처럼" 다룰 때 표준 표현이다.</td>
<td>2,3,4,5</td>
</tr>
<tr class="even">
<td>FFT/STFT</td>
<td>(Short-Time) Fast Fourier Transform</td>
<td>소리를 시간 구간별로 잘라 어떤 주파수가 얼마만큼 들어 있는가를 보여주는 사진을 만드는 기법. 일반 스펙트로그램이 그 결과다.</td>
<td>6</td>
</tr>
<tr class="odd">
<td>크로마 특징</td>
<td>Chroma Feature</td>
<td>12음(도, 도샵, 레, ...)이 매 시점에 얼마나 강하게 들리는지 숫자로 나타낸 표현. 옥타브 차이는 무시해서 음악적 화성을 부각시킨다.</td>
<td>7</td>
</tr>
<tr class="even">
<td>상수 Q 변환</td>
<td>Constant-Q Transform (CQT)</td>
<td>사람이 음을 옥타브 단위로 듣는다는 점을 반영해, 낮은 음에는 큰 창, 높은 음에는 작은 창을 쓰는 특수한 주파수 분석. 균등한 비율로 음을 본다.</td>
<td>6</td>
</tr>
<tr class="odd">
<td>슬라이스 CQT</td>
<td>sliCQ / NSGT-CQT</td>
<td>일반 CQT를 실시간으로 돌릴 수 있도록 작은 조각으로 잘라 처리하는 알고리즘. 비-정상 가버 변환에 기반한다.</td>
<td>6</td>
</tr>
<tr class="even">
<td>음표 시작점</td>
<td>Onset</td>
<td>건반이 눌리는 그 순간. 피아노에서는 박자감을 결정하는 가장 또렷한 시간 단서다.</td>
<td>1,7,9</td>
</tr>
<tr class="odd">
<td>프레임 활성</td>
<td>Frame Activity</td>
<td>어느 시점에 어떤 음이 울리고 있는가(시작이 아닌 지속). 오랫동안 누른 건반은 onset은 한 번이지만 frame은 길게 이어진다.</td>
<td>7</td>
</tr>
<tr class="even">
<td>화성 특징</td>
<td>Harmonic Feature</td>
<td>어떤 음들이 함께 울려 만드는 화음 색을 나타내는 특징. 정규화된 onset 특징과 결합해 안정적인 정렬에 쓰인다.</td>
<td>1</td>
</tr>
<tr class="odd">
<td>특징량 정규화</td>
<td>Feature Normalization</td>
<td>들어오는 소리에서 뽑은 수치들을 일정 스케일로 맞춰 두는 작업. 마이크가 갑자기 커지거나 음 하나가 유난히 강해도 알고리즘이 흔들리지 않게 만든다.</td>
<td>1</td>
</tr>
<tr class="even">
<td>원시 특징</td>
<td>Raw Feature</td>
<td>신경망이 0/1 결정을 내리기 직전, 마지막 층에서 흘러나오는 0~1 사이 연속 확률값. 이산화하면서 잃어버리는 모호함의 정보까지 그대로 살린다.</td>
<td>7</td>
</tr>
<tr class="odd">
<td>심볼릭 특징</td>
<td>Symbolic Feature (SYM)</td>
<td>raw 확률에 임계값을 적용해 0/1로 잘라낸 결과. 깔끔하지만 모호함이 사라진다.</td>
<td>7</td>
</tr>
<tr class="even">
<td>피아노 롤</td>
<td>Piano Roll</td>
<td>가로축 시간, 세로축 128개 MIDI 음 번호로 음을 표시한 격자. 다성 음악의 표현이 자연스럽다.</td>
<td>8,9</td>
</tr>
<tr class="odd">
<td>음표 시작 확률</td>
<td>Raw Onset Probability</td>
<td>채보 신경망(예: Onsets and Frames)이 "이 시점에 이 음이 시작될 가능성"으로 출력한 0~1 사이 연속 확률값. Bukey 2024는 이 값을 임계값으로 0/1 piano roll로 자르지 않고 그대로 DTW 입력으로 사용해, 정보 손실을 줄이고 정렬 정확도를 크게 높였다(MAcc 0.46 → 0.88).</td>
<td>9</td>
</tr>
</tbody>
</table>
<h2 id="4-딥러닝신경망-관련-용어">4. 딥러닝/신경망 관련 용어</h2>
<table>
<thead>
<tr class="header">
<th>용어</th>
<th>영문</th>
<th>직관적 설명</th>
<th>등장 논문</th>
</tr>
</thead>
<tbody>
<tr class="odd">

<h2 id="7-2025-2026-신규-개념">7. 2025-2026 신규 개념</h2>
<p>10-13번 논문에서 등장한 새 어휘를 별도 카테고리로 묶었다. 이 용어들은 분야가 2025년에 들어 채택한 새 패러다임 — transcribe-then-track, 저지연 real-time, transformer + native MusicXML — 을 이해하는 데 필수다.</p>
