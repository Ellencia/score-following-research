<template id="doc-10_landscape" data-title="2025-2026 Score Following 분야 동향" data-docx="10_2025_2026_landscape.docx"><h1 id="2025-2026-score-following-분야-동향--13편-추가-문헌--공백-영역-정리">2025-2026 Score Following 분야 동향 — 13편 추가 문헌 + 공백 영역 정리</h1>
<h2 id="도입-9편-이후의-18개월">도입: 9편 이후의 18개월</h2>
<p>본 프로젝트의 첫 9편은 2016-2024년의 연구를 다뤘다. 그 9편이 다루지 못한 시기 — 2025년 1월부터 2026년 5월까지 약 18개월 — 동안 분야는 세 가지 큰 흐름으로 움직였다. 첫째, <strong>transcribe-then-track</strong>으로 명명할 수 있는 새 패러다임이 JKU 그룹에서 본격 정량 검증을 받았다(분석 11번 + 분석 12번). 둘째, <strong>transformer + native MusicXML</strong>의 결합이 QMUL에서 등장하며, 분야가 그동안 우회해 온 반복 기호 처리를 학습으로 푸는 것이 가능해졌다(분석 13번). 셋째, <strong>표준화된 평가 인프라</strong>가 처음으로 공개되어 후속 연구의 baseline 비교 비용이 크게 낮아졌다(분석 10번). 이 네 편(분석 10-13번)이 본 프로젝트의 풀 트리트먼트를 받은 Tier 1이며, 본 문서는 그 외에 분야의 이해를 위해 알아두어야 할 13편(Tier 2 5편 + Tier 3 6편 + 공백 영역 정리)을 산문 위주로 정리한다.</p>
<p>자료 범위: 본 문서가 다루는 18개월 동안 ISMIR 2025·SMC 2025·ICASSP 2025·WASPAA 2025·CMMR 2025에서 발표된 score following 인접 논문 + arXiv 사전 출판본 전체. ISMIR 2026(Abu Dhabi, 2026년 11월 8-12일)은 투고는 진행 중이나 논문집은 미공개로 본 문서 범위 밖이다.</p>
<h2 id="tier-2--응용에-직접-영향을-주는-5편">Tier 2 — 응용에 직접 영향을 주는 5편</h2>
<p>이 5편은 풀 트리트먼트(분석 보고서 + 비전공자 해설)를 받지는 않으나, 분야 흐름과 본 프로젝트 페이지 터너 응용 양쪽에서 무게가 충분한 작업들이다.</p>
<h3 id="cowley-2025--gphmm-통계-추론-score-follower-arxiv250210426">Cowley 2025 — GP+HMM 통계 추론 score follower (arXiv:2502.10426)</h3>
<p>Josephine Cowley(Cambridge, supervisor Simon Godsill)의 학위 논문 단행본으로 추정되는 작업으로, 2025년 2월에 arXiv로 공개되었다. 시스템은 두 단계 — Spectral-Mixture Gaussian Process로 약 18 ms 프레임마다 음고를 추론하고, duration-HMM이 그 결과를 받아 악보 위치를 추적한다. <strong>본 프로젝트의 9편 + Tier 1 4편을 통틀어 2025년에 비-피아노 정량을 보고한 유일한 논문</strong>이라는 점이 결정적이다 — 바이올린, 오보에, 플루트, 그리고 4성부 키보드 찬송가에서 모두 평가가 진행되었다. Score following을 자동 페이지 터너 응용으로 명시하는 것도 본 논문 동기의 핵심이다. 통계 추론 골격은 새로울 것이 없으나(GP 음고 추정과 HMM 정렬은 각각 분야의 표준), 그 결합과 비-피아노 평가가 분야의 격차를 정확히 짚어낸다.</p>
<h3 id="pillay-2025--heurmit-1d-cnn--휴리스틱-arxiv250306348">Pillay 2025 — HeurMiT 1D-CNN + 휴리스틱 (arXiv:2503.06348)</h3>
<p>본 프로젝트의 분석 8번(Pillay 2024 CMU MS thesis)의 2025년 3월 arXiv 확장판이다. "Tyke"라 불리는 작은 CNN이 piano roll의 latent 표상을 학습한 뒤 휴리스틱 후처리(MIDIOgre 라이브러리)로 강건성을 확보한다. <strong>본 논문의 가장 큰 가치는 솔직성 — DL 기반 score following이 아직 deployment에 적합하지 않다는 점을 정량으로 인정한다는 점이다</strong>. MIDIOgre(GitHub <code>a-pillay/MIDIOgre</code>)는 MIDI augmentation 도구 모음으로, 다른 악기·다른 표현 변동성에 대한 학습 강건성을 키우는 재사용 가능한 컴포넌트다. 본 프로젝트 페이지 터너 응용에서 직접 백엔드로 쓰기는 어렵지만, 학습 데이터 augmentation 측면에서 가치가 크다.</p>
<h3 id="jiang-maezawa-xia-2025--improvised-performance-following-icassp-2025">Jiang-Maezawa-Xia 2025 — Improvised Performance Following (ICASSP 2025)</h3>
<p>NYU/MBZUAI의 Junyan Jiang, Yamaha의 Akira Maezawa, MBZUAI의 Gus Xia가 ICASSP 2025에서 발표한 작업으로, 즉흥 연주(improvisation)에서의 큰 표현적 일탈에도 강건한 score follower를 다룬다. 본 프로젝트에서는 사용자가 <strong>유료 구매가 필요해 PDF 확보 불가</strong>이므로 분석을 가볍게 둔다. 분야 흐름 관점에서는 Arzt-Widmer 2015의 multiple performances 사상을 즉흥 환경으로 확장한 후속에 가까우며, 페이지 터너 응용이 재즈/팝 같은 표현 변동이 큰 환경으로 갈 때의 baseline.</p>
<h3 id="tsai-dey-özer-müller-2025--dense-sparse-dtw-icassp-2025">Tsai-Dey-Özer-Müller 2025 — Dense-Sparse DTW (ICASSP 2025)</h3>
<p>HMC와 AudioLabs Erlangen 공동 작업으로, sparse onset peak를 dense 시퀀스에 정렬하는 새 DTW 변형이다. 합주(concerto) 환경 — 협연 악기 + 오케스트라 노이즈 — 에서 솔로 연주 부분만 따라가는 데 강건하며, 새 Concerto Accompaniment Benchmark 데이터셋(GitHub <code>HMC-MIR/PianoConcertoAccompaniment</code>)도 함께 공개되었다. <strong>첼로/바이올린 협주곡 페이지 터너에 직접 응용 가능한 알고리즘</strong>으로, 본 프로젝트의 첼로/바이올린 사용자 시나리오에서는 Matchmaker(분석 10번) + 본 알고리즘 결합이 자연스러운 출발점이 된다.</p>
<h3 id="murgul-reiser-heizmann-seibert-2025--dtw--crnn-후처리-arxiv250622237">Murgul-Reiser-Heizmann-Seibert 2025 — DTW + CRNN 후처리 (arXiv:2506.22237)</h3>
<p>Klangio GmbH(독일 Karlsruhe의 음악 채보 산업체)와 KIT의 공동 작업. 표준 DTW 결과를 piano roll + CQT 두 표상을 병렬로 받는 CRNN(Convolutional Recurrent Neural Network)으로 fine-tune해 정렬 정확도를 최대 20% 개선한다고 보고한다. 학습 시 Klangio가 보유한 <strong>인간 timing-error 시뮬레이션 MIDI augmentation</strong>을 사용한다는 점이 특이하다 — 산업체 자원이 학술 연구로 환원되는 흔치 않은 사례. 분야 흐름 관점에서는 "DTW를 두고 신경망으로 사후 보정한다"는 hybrid 노선의 한 사례이며, 본 프로젝트의 Zeitler 2024(분석 7번, transcription raw feature를 DTW에 투입)와는 정반대 방향 — Zeitler는 DTW의 입력을 학습하고, Murgul은 DTW의 출력을 학습한다.</p>
<h3 id="zeitler-müller-2025--reformulating-soft-dtw-ismir-2025-paper_0004">Zeitler-Müller 2025 — Reformulating Soft DTW (ISMIR 2025, paper_0004)</h3>
<p>Johannes Zeitler(분석 7번 1저자)와 Meinard Müller가 ISMIR 2025에서 발표한 이론적 reformulation 연구로, ISMIR 2025 award nominee. Soft-DTW 손실의 gradient가 implicitly blurred target을 가정한다는 분석과 그에 대한 corrected loss 제안을 담는다. <strong>약 약 라벨링(예: 마디 단위) audio↔︎score 데이터로 신경망 정렬 모델을 학습하는 모든 분야에 직접 영향</strong>이 있는 결과다. 본 프로젝트 페이지 터너 응용 측면에서, 비-피아노(첼로·기타) 데이터의 음 단위 정렬 ground truth를 얻기 어려운 현실 — 이 약 라벨링 학습 환경에서 Reformulated Soft DTW가 2025년의 권장 손실. AudioLabs ISMIR 2025 튜토리얼 <em>Differentiable Alignment Techniques for Music Processing</em>과 함께 보면 분야 표준 학습 레시피를 일별 가능.</p>
<p>(<em>추가 참고: 본 프로젝트가 받은 Tier 2 폴더에 Dannenberg-Raphael 2006 CACM 서베이가 함께 들어 있다 — 분야의 foundational 참조로 가치가 있으나 2025-2026 동향에는 직접 해당하지 않음.</em>)</p>
<h2 id="tier-3--ismir-2025--smc-2025--cmmr-2025-인접-6편">Tier 3 — ISMIR 2025 / SMC 2025 / CMMR 2025 인접 6편</h2>
<p>이 6편은 각자 좁은 응용에 강한 시사점을 주는 작업들이다.</p>
<h3 id="primenta-loth-tang-riley-dixon-benetos-2025--multi-instrument-통합-데모-ismir-2025-lbd-482">Primenta-Loth-Tang-Riley-Dixon-Benetos 2025 — Multi-instrument 통합 데모 (ISMIR 2025 LBD #482)</h3>
<p>QMUL 그룹(분석 13번 RUMAA의 같은 그룹)이 ISMIR 2025 Late-Breaking Demo로 공개한 시스템으로, <strong>piano·violin·guitar 정확히 세 악기에서 score alignment + error detection을 시연</strong>했다. 본 프로젝트 페이지 터너의 사용자 악기 셋(피아노/바이올린/첼로/기타) 중 셋이 이 LBD에 포함된다는 점이 시사한다 — 분야가 비-피아노 일반화로 본격 진입했다는 신호. LBD라 정식 논문과 코드가 없으나, 분야 동향상 RUMAA의 multi-instrument 후속이 가까운 시일 안에 등장할 가능성이 매우 높다.</p>
<h3 id="nakamura-koutaki-2025--로보-합주-시스템-ismir-2025-lbd-419">Nakamura-Koutaki 2025 — 로보 합주 시스템 (ISMIR 2025 LBD #419)</h3>
<p>Eita Nakamura(Kyushu University, RUMAA의 Nakamura HMM[3] 1저자)와 Gou Koutaki(Kumamoto University)가 ISMIR 2025 LBD로 공개한 ensemble 시스템. <strong>MIDI 기반 score follower로 errors·repeats·large skips를 다룬다</strong>고 명시되어 있어, 페이지 터너 응용에 필수인 강건한 jump 처리에 직접 시사점이 있다. RUMAA가 학습으로 푼 문제를 동일 그룹의 lineage가 결정론적 알고리즘으로 어떻게 보강하는지의 비교점.</p>
<h3 id="choi-kwon-nam-2025--multimodal-flutist-onset-timing-ismir-2025-paper-12-pp-100-106">Choi-Kwon-Nam 2025 — Multimodal Flutist Onset Timing (ISMIR 2025 paper #12, pp. 100-106)</h3>
<p>KAIST GSCT의 Jaeran Choi, Taegyun Kwon, Juhan Nam이 발표한 작업으로, <strong>gesture + breath cue를 결합한 multimodal 모델로 듀엣 환경에서 플루티스트의 onset 시각을 예측</strong>한다. Audio만으로는 fermata, 페이지 전환, 쉼표 후 진입 같은 순간에 score follower가 흔들리는데, 비디오/제스처/호흡 단서가 그 격차를 메운다. 본 프로젝트 페이지 터너에서 태블릿 전면 카메라가 사용 가능한 환경이라면, 첼로/바이올린/기타에서도 같은 접근(악기 자세, 활/피크 움직임, 호흡)으로 audio-only 한계를 보완할 수 있다는 강한 신호. (Matchmaker[35]의 Park, Cancino-Chacón과 같은 KAIST 그룹.)</p>
<h3 id="morsi-chiruthapudi-peter-pilkov-bishop-maezawa-serra-cancino-chacón-2025--rach3-midi-dataset-ismir-2025-paper-56-pp-484-491">Morsi-Chiruthapudi-Peter-Pilkov-Bishop-Maezawa-Serra-Cancino-Chacón 2025 — Rach3 MIDI Dataset (ISMIR 2025 paper #56, pp. 484-491)</h3>
<p>JKU + UPF Barcelona + Yamaha 공동 작업으로, <strong>장시간 피아노 <em>리허설</em> MIDI 데이터셋</strong>을 공개한다(데이터셋 도메인 dataset.rach3project.com). 정련된 콘서트가 아닌 실제 연습실 환경 — 반복, 재시작, 실수, 멈춤 — 의 데이터로, 본 프로젝트 페이지 터너의 가장 현실적 사용 환경(연습실, 가정의 학습용 사용)을 정조준한다. <strong>연습실 행동의 분포가 콘서트와 어떻게 다른가</strong>를 정량으로 측정하기에 가장 좋은 자원. 분석 10번 Matchmaker의 ACK에서 같은 Rach3 프로젝트(FWF PAT 8820923)를 펀딩 출처로 인용 — JKU 그룹 내부에서 라이브러리(Matchmaker), 시스템(transcribe-then-track), 데이터셋(Rach3)이 같은 프로젝트의 세 다리로 작동.</p>
<h3 id="yucong-jiang-weigl-goebl-2025--piano-precision-smc-2025">Yucong Jiang-Weigl-Goebl 2025 — PIANO PRECISION (SMC 2025)</h3>
<p>University of Richmond의 Yucong Jiang(분석 10번 [47] Jiang-Raphael 2020 ISMIR의 1저자)와 Vienna mdw의 Weigl, Goebl이 SMC 2025에서 공개한 도구. <strong>오프라인 정렬 + 사용자 수정 UI</strong>의 결합으로, 정렬 결과의 마지막 1-2%를 사람이 빠르게 보정하게 한다. 15-user user study가 함께 진행되어 인간-기계 협업의 실제 비용/효용을 정량 측정. 본 프로젝트의 분석 9번 JLTR(반복 기호 사람 라벨링)과 같은 사상의 SMC 2025 후속이며, 페이지 터너 사용자가 "이 페이지 살짝 다른 위치에서 멈춰 줘" 같은 빠른 수정 인터랙션을 설계할 때 직접 참고할 HCI 자원.</p>
<h3 id="chiruthapudi-štefunko-hajič-jr-cancino-chacón-2025--basso-continuo-cmmr-2025">Chiruthapudi-Štefunko-Hajič jr.-Cancino-Chacón 2025 — Basso Continuo (CMMR 2025)</h3>
<p>JKU + Charles University in Prague 공동 작업. <strong>바로크의 basso continuo — 즉 즉흥 화성 반주 — 환경에서의 alignment 문제를 정량으로 측정</strong>한다. 분야의 score-following 평가가 거의 모두 클래식 piano solo에 한정되어 있던 가운데, 비-피아노 + 즉흥 + 자유 템포라는 세 어려움이 동시에 작용하는 환경의 첫 본격적 평가. 본 프로젝트 페이지 터너의 첼로/바이올린/기타 사용자가 자유 템포로 연주하는 경우의 baseline 한계를 알기에 좋은 자원이다.</p>
<h2 id="2025-2026-분야-데이터셋의-새로운-풍경">2025-2026 분야 데이터셋의 새로운 풍경</h2>
<p>분야의 학습/평가 자원이 2025년에 크게 확장되었다. 본 프로젝트의 별도 문서 <code>11_데이터셋_인벤토리.md</code>에서 6종 신규 데이터셋(GOAT, Guitar-TECHS, PianoVAM, Rach3, PDMX, Sheet Music Benchmark)을 표 + 사용 시나리오로 정리한다. 본 절에서는 분야 동향 측면에서의 의미만 짧게 짚는다.</p>
<p><strong>비-피아노 자원의 폭발</strong>. GOAT(Loth et al. ISMIR 2025, 35.4 시간 일렉기타 + Guitar Pro 탭, CC-BY 4.0)와 Guitar-TECHS(Pedroza et al. ICASSP 2025, multi-mic + DI + per-string MIDI 픽업)는 일렉기타 score-following이 학습으로 풀리는 환경을 처음 마련한다. 이 두 데이터셋이 결합되면, 본 프로젝트 페이지 터너의 기타 사용자 시나리오에서 분석 10-12번의 transcribe-then-track 노선의 AMT 모듈을 일렉기타용으로 fine-tune하는 것이 처음으로 가능해진다.</p>
<p><strong>피아노 자원의 다양성 확대</strong>. PianoVAM(Kim et al. ISMIR 2025, 21시간 audio + video + MIDI + hand landmarks + fingering)은 아마추어 Disklavier 환경의 multi-modal 데이터로, 본 프로젝트 분석 12번 Hu-Peter-Schlüter-Widmer가 future work로 명시한 in-the-wild 강건성 평가에 가장 적합한 자원이다. Rach3는 위에서 언급했듯 연습실 행동의 데이터.</p>
<p><strong>범용 multimodal 학습 풀</strong>. PDMX(Long et al. ICASSP 2025, 250K MusicXML)는 가장 큰 public domain MusicXML 풀로, 합성 audio와 짝지어 multi-instrument score-following 학습 데이터를 부트스트랩하기에 충분한 규모. 분석 13번 RUMAA의 학습 augmentation 사상을 PDMX 위에 얹으면 학습 데이터 규모를 한 자릿수 더 늘릴 수 있다.</p>
<p><strong>OMR 표준의 등장</strong>. Sheet Music Benchmark(Martinez-Sevilla et al. ISMIR 2025, multi-genre Humdrum **kern)는 OMR(Optical Music Recognition) 분야의 새 공통 벤치다. 본 프로젝트 페이지 터너가 PDF 입력을 받을 때, OMR로 score를 디지털화하는 단계의 baseline.</p>
<h2 id="공백-영역--2025-2026에-없는-것들">공백 영역 — 2025-2026에 <em>없는</em> 것들</h2>
<p>분야의 진전만큼이나 negative finding도 가치가 있다. 본 절은 이 18개월 동안 분명히 등장하지 않은 흐름들을 정리한다.</p>
<p><strong>Foundation model을 score following에 직접 적용한 논문이 없다.</strong> MERT-95M(2023, Yizhi Li et al.), MusicFM(2024), MuQ(2024) 같은 음악 foundation model이 분야에 등장했지만, 그 embedding을 Matchmaker의 Processor 자리에 끼워 넣어 score follower로 사용한 정량 비교 논문이 본 프로젝트가 다룬 18개월 동안 단 한 편도 없다. RUMAA(분석 13번)의 pre-trained YourMT3+가 가장 가까운 사례지만, YourMT3+는 transcription 모델이지 일반 음악 foundation model이 아니다. <strong>이 격차는 후속 연구의 분명한 빈 공간</strong>이다.</p>
<p><strong>Diffusion 기반 score following이 없다.</strong> 분야의 diffusion 모델은 generation(음악 생성), mastering(자동 마스터링), surprisal estimation(놀라움 추정)으로 갔지 alignment로 가지 않았다. Diffusion-based alignment가 가능한지, 그것이 transformer-based(RUMAA) 대비 어떤 trade-off를 가지는지가 분야의 다음 큰 비교 축이 될 수 있다.</p>
<p><strong>페이지 터너 시스템 그 자체에 대한 본격 논문이 없다.</strong> Score following 논문들은 거의 모두 페이지 터너를 동기로 인용하지만, 페이지 터너 시스템 자체의 평가·UX·실패 분석을 담은 논문은 2020 Tabone et al.(시선 기반)과 2021 Henkel et al. CYOLO(분석 5번 — 시트 이미지 기반)이 마지막으로, 2025년 18개월 동안은 새 후속이 없다. NIME 2025·CHI 2025·UIST 2025 어디에도 audio-driven 페이지 터너의 user study 논문이 없다. <strong>본 프로젝트가 만들고 있는 페이지 터너 응용 자체가 2025년에 발표할 만한 학술 가치를 가지고 있다는 의미</strong>이기도 하다.</p>
<p><strong>비-피아노 score follower의 풀 정량 비교가 없다.</strong> Cowley 2025(GP+HMM, 바이올린/플루트/오보에)가 2025년의 유일한 비-피아노 정량 보고. 첼로 전용 follower는 본 프로젝트가 다룬 18개월 동안 한 편도 없다. 일렉기타도 LBD #482(Primenta et al.)가 시연만 했지 정식 논문은 없다. GOAT/Guitar-TECHS 데이터셋이 등장한 만큼 후속 연구가 곧 나올 것으로 보이나, 본 시점에서는 비어 있다.</p>
<p><strong>Henkel/IRCAM 라인의 침묵.</strong> 분석 5번(Henkel 2021 BBox)의 1저자 Florian Henkel은 현재 Apple에 근무하며 contrastive music embedding 연구를 하고 있어, 시트 이미지 기반 score following의 직계 후속 연구는 18개월 동안 등장하지 않았다. IRCAM의 Antescofo 라인(Cont 2008)과 CMU의 Dannenberg/Raphael 라인도 마찬가지로 새 score-following 논문이 없는 상태. 분야가 JKU(Matchmaker, transcribe-then-track, low-latency AMT, Rach3)와 QMUL(RUMAA, multi-instrument LBD)이라는 두 그룹의 인프라적 기여로 무게중심이 이동했다.</p>
<h2 id="결론--18개월의-한-줄-요약과-응용-권고">결론 — 18개월의 한 줄 요약과 응용 권고</h2>
<p>이 18개월 동안 분야는 <strong>(1) audio OLTW 시대의 끝</strong>(분석 11번이 plateau를 정량 입증), <strong>(2) transcribe-then-track으로의 이동</strong>(분석 11번 + 12번 + 13번), <strong>(3) 평가 인프라의 표준화</strong>(분석 10번 Matchmaker), <strong>(4) 비-피아노 재진입의 신호</strong>(GOAT, Guitar-TECHS, Cowley 2025, LBD #482) 네 가지를 동시에 보였다. 본 프로젝트 페이지 터너 응용의 구체적 권고는 별도 문서 <code>12_페이지터너_적용_권고.md</code>로 분리한다. 핵심만 짧게 — Matchmaker를 백엔드로, JLTR(분석 9번)의 repeat UX를 차용, 일렉기타용으로 GOAT+Guitar-TECHS 위에 AMT fine-tune, 그리고 무엇보다도 <strong>MERT/MuQ를 비-피아노 score following에 처음 적용하는 것이 분야 단일 가장 큰 미개척 연구 기회</strong>다.</p></template>
